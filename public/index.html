<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Оранжевый чат</title>
  <style>
    /* Чёрно-оранжевая тема */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #121212;
      overflow-x: hidden;
    }

    #login {
      background: #1e1e1e;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      width: 90%;
      max-width: 400px;
      text-align: center;
      color: #fff;
    }

    #login h2 {
      margin-bottom: 1.5rem;
      color: #ff8c00;
    }

    #login input {
      width: 100%;
      padding: 1rem;
      margin: 1rem 0;
      border: 1px solid #444;
      border-radius: 30px;
      font-size: 1rem;
      outline: none;
      background: #2a2a2a;
      color: #fff;
      transition: border 0.2s;
    }

    #login input:focus {
      border-color: #ff8c00;
    }

    #login button {
      padding: 1rem 2rem;
      background: #ff8c00;
      color: #121212;
      border: none;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }

    #login button:active {
      background: #e07b00;
    }

    #error {
      color: #ff6b6b;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    #chat {
      display: none;
      width: 100%;
      height: 100%;
      background: #121212;
      overflow-x: hidden;
    }

    .chat-container {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
      overflow-x: hidden;
    }

    .sidebar {
      width: 300px;
      background: #1e1e1e;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      padding: 1rem;
      background: #ff8c00;
      color: #121212;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
    }

    #change-nick-btn {
      background: transparent;
      border: 1px solid #121212;
      color: #121212;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
    }

    #change-nick-btn:active {
      background: rgba(0,0,0,0.1);
    }

    #user-list {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #user-list li {
      padding: 1rem;
      border-bottom: 1px solid #333;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.1rem;
      color: #fff;
      transition: background 0.2s;
    }

    #user-list li:active {
      background: #2a2a2a;
    }

    #user-list li.selected {
      background: #b85e00;
      color: #121212;
      box-shadow: inset 0 0 0 1px rgba(255,140,0,0.5);
    }

    .notification-badge {
      background: #ff8c00;
      color: #121212;
      border-radius: 50%;
      min-width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: bold;
      padding: 0 4px;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #121212;
    }

    #chat-header {
      padding: 1rem;
      background: #1e1e1e;
      border-bottom: 1px solid #333;
      font-weight: bold;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #ff8c00;
    }

    #back-btn {
      background: transparent;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.5rem 1rem;
      display: none;
      color: #ff8c00;
      font-weight: bold;
    }

    #back-btn:active {
      opacity: 0.6;
    }

    #clear-chat-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid #ff8c00;
      color: #ff8c00;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    #clear-chat-btn:active {
      background: rgba(255,140,0,0.2);
    }

    #messages {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      max-width: 80%;
      margin-bottom: 0.25rem;
      padding: 0.75rem 1rem;
      border-radius: 20px;
      word-wrap: break-word;
      overflow-wrap: break-word;
      word-break: break-word;
      font-size: 1rem;
      line-height: 1.4;
      position: relative;
    }

    .message.own {
      align-self: flex-end;
      background: #ff8c00;
      color: #121212;
      border-bottom-right-radius: 4px;
    }

    .message.other {
      align-self: flex-start;
      background: #2a2a2a;
      color: #fff;
      border-bottom-left-radius: 4px;
    }

    .message .sender {
      font-size: 0.85rem;
      font-weight: bold;
      margin-bottom: 0.25rem;
      color: #aaa;
    }

    .message .time {
      font-size: 0.7rem;
      margin-top: 4px;
      opacity: 0.7;
      text-align: right;
    }
    .message.own .time {
      color: #121212;
    }
    .message.other .time {
      color: #aaa;
    }

    .message img {
      max-width: 100%;
      max-height: 200px;
      border-radius: 8px;
      cursor: pointer;
      display: block;
      margin-top: 4px;
    }

    .message-actions {
      position: absolute;
      top: -20px;
      right: 0;
      display: flex;
      gap: 5px;
      background: #1e1e1e;
      border-radius: 20px;
      padding: 2px 5px;
      border: 1px solid #333;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .message.own:hover .message-actions {
      opacity: 1;
    }

    .message-actions button {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 5px;
      color: #ff8c00;
    }

    .input-area {
      display: flex;
      padding: 0.75rem;
      border-top: 1px solid #333;
      background: #1e1e1e;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    #message-input {
      flex: 1 1 200px;
      padding: 0.75rem 1rem;
      border: 1px solid #444;
      border-radius: 30px;
      font-size: 1rem;
      outline: none;
      min-width: 0;
      background: #2a2a2a;
      color: #fff;
    }

    #message-input:focus {
      border-color: #ff8c00;
    }

    #send-btn {
      padding: 0.75rem 1.5rem;
      background: #ff8c00;
      color: #121212;
      border: none;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      min-width: 80px;
      white-space: nowrap;
    }

    #send-btn:active {
      background: #e07b00;
    }

    #send-btn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    #image-upload {
      display: none;
    }

    .image-upload-label {
      background: #ff8c00;
      color: #121212;
      padding: 0.5rem 1rem;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
    }

    /* Модальное окно редактирования */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #1e1e1e;
      padding: 2rem;
      border-radius: 16px;
      width: 90%;
      max-width: 500px;
      color: #fff;
    }

    .modal-content textarea {
      width: 100%;
      min-height: 100px;
      margin: 1rem 0;
      padding: 0.5rem;
      border: 1px solid #444;
      border-radius: 8px;
      background: #2a2a2a;
      color: #fff;
      font-size: 1rem;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal-buttons button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    #save-edit-btn {
      background: #ff8c00;
      color: #121212;
    }

    #cancel-edit-btn {
      background: #444;
      color: #fff;
    }

    @media (max-width: 768px) {
      body, #chat, .chat-container {
        overflow-x: hidden;
      }

      .chat-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 100%;
        border-right: none;
      }

      .main {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        background: #121212;
        transform: translateX(100%);
        transition: transform 0.3s ease;
        z-index: 10;
      }

      .main.active {
        transform: translateX(0);
      }

      #back-btn {
        display: inline-block;
      }

      #user-list li {
        padding: 1.2rem 1rem;
        font-size: 1.2rem;
      }

      .notification-badge {
        min-width: 28px;
        height: 28px;
        font-size: 1rem;
      }

      #send-btn {
        padding: 0.7rem 1.2rem;
        font-size: 1rem;
        min-width: 70px;
      }

      #message-input {
        padding: 0.7rem 1rem;
        font-size: 1rem;
      }

      #chat-header {
        padding: 1.2rem;
        font-size: 1.3rem;
      }

      #back-btn {
        font-size: 1.8rem;
        padding: 0.5rem 1rem 0.5rem 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div id="login">
    <h2>Оранжевый чат</h2>
    <input type="text" id="name-input" placeholder="Ваше имя" autofocus>
    <button id="join-btn">Войти</button>
    <div id="error"></div>
  </div>

  <div id="chat">
    <div class="chat-container">
      <div class="sidebar">
        <div class="sidebar-header">
          <span>Участники онлайн</span>
          <button id="change-nick-btn">Сменить ник</button>
        </div>
        <ul id="user-list"></ul>
      </div>
      <div class="main" id="chat-main">
        <div id="chat-header">
          <button id="back-btn">←</button>
          <span id="chat-title">Выберите собеседника</span>
          <button id="clear-chat-btn" style="display: none;">Очистить чат</button>
        </div>
        <div id="messages"></div>
        <div class="input-area">
          <input type="text" id="message-input" placeholder="Сообщение" disabled>
          <label for="image-upload" class="image-upload-label" id="upload-label">📷</label>
          <input type="file" id="image-upload" accept="image/*">
          <button id="send-btn" disabled>Отправить</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Модальное окно редактирования -->
  <div id="edit-modal" class="modal">
    <div class="modal-content">
      <h3>Редактировать сообщение</h3>
      <textarea id="edit-textarea"></textarea>
      <div class="modal-buttons">
        <button id="save-edit-btn">Сохранить</button>
        <button id="cancel-edit-btn">Отмена</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    // Генерация уникального ID на клиенте
    function generateClientId() {
      return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    }

    // Генерация ID для сообщения
    function generateMessageId() {
      return 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }

    // Элементы DOM
    const loginDiv = document.getElementById('login');
    const chatDiv = document.getElementById('chat');
    const nameInput = document.getElementById('name-input');
    const joinBtn = document.getElementById('join-btn');
    const errorDiv = document.getElementById('error');
    const userListEl = document.getElementById('user-list');
    const chatMain = document.getElementById('chat-main');
    const chatTitle = document.getElementById('chat-title');
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const backBtn = document.getElementById('back-btn');
    const changeNickBtn = document.getElementById('change-nick-btn');
    const clearChatBtn = document.getElementById('clear-chat-btn');
    const imageUpload = document.getElementById('image-upload');
    const uploadLabel = document.getElementById('upload-label');

    // Модальное окно редактирования
    const editModal = document.getElementById('edit-modal');
    const editTextarea = document.getElementById('edit-textarea');
    const saveEditBtn = document.getElementById('save-edit-btn');
    const cancelEditBtn = document.getElementById('cancel-edit-btn');

    // Состояние
    let currentUser = null;
    let selectedUser = null;
    let users = [];
    let chatHistory = {}; // peerId -> массив сообщений { id, fromName, text, isOwn, read, time, imageUrl }
    let audioContext = null;
    let currentEditMessageId = null; // для редактирования

    // ---- Загрузка из localStorage ----
    function loadFromStorage() {
      const savedName = localStorage.getItem('userName');
      const savedId = localStorage.getItem('userId');
      if (savedName && savedId) {
        currentUser = { id: savedId, name: savedName };
        nameInput.value = savedName;
        const savedHistory = localStorage.getItem('chatHistory');
        if (savedHistory) {
          try {
            chatHistory = JSON.parse(savedHistory);
          } catch (e) {}
        }
        loginDiv.style.display = 'none';
        chatDiv.style.display = 'flex';
        socket.emit('join', { name: savedName, userId: savedId });
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
      }
    }

    // ---- Сохранение в localStorage ----
    function saveToStorage() {
      if (currentUser) {
        localStorage.setItem('userName', currentUser.name);
        localStorage.setItem('userId', currentUser.id);
        localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
      }
    }

    // ---- Очистка storage (смена ника) ----
    function clearStorageAndRelogin() {
      localStorage.removeItem('userName');
      localStorage.removeItem('userId');
      localStorage.removeItem('chatHistory');
      currentUser = null;
      selectedUser = null;
      chatHistory = {};
      location.reload();
    }

    // ---- Вход по кнопке ----
    joinBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if (!name) return;
      let userId = localStorage.getItem('userId');
      if (!userId) {
        userId = generateClientId();
        localStorage.setItem('userId', userId);
      }
      socket.emit('join', { name, userId });
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
    });

    nameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') joinBtn.click();
    });

    // ---- Смена ника ----
    changeNickBtn.addEventListener('click', clearStorageAndRelogin);

    // ---- Ошибка входа ----
    socket.on('joinError', (msg) => {
      errorDiv.textContent = msg;
      if (currentUser) {
        clearStorageAndRelogin();
      }
    });

    // ---- Успешный вход ----
    socket.on('joined', (user) => {
      currentUser = user;
      localStorage.setItem('userName', user.name);
      localStorage.setItem('userId', user.id);
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      loginDiv.style.display = 'none';
      chatDiv.style.display = 'flex';
    });

    // ---- Предупреждение о kicked ----
    socket.on('kicked', (data) => {
      if (data.userId === currentUser?.id) {
        alert(data.message);
        location.reload();
      }
    });

    // ---- Обновление списка пользователей ----
    socket.on('user list', (onlineUsers) => {
      users = onlineUsers.filter(u => u.id !== currentUser?.id);
      renderUserList();

      if (selectedUser && !users.find(u => u.id === selectedUser.id)) {
        closeChat();
      }
    });

    function renderUserList() {
      userListEl.innerHTML = '';
      users.forEach(user => {
        const li = document.createElement('li');
        li.dataset.id = user.id;
        
        const nameSpan = document.createElement('span');
        nameSpan.textContent = user.name;
        li.appendChild(nameSpan);

        const history = chatHistory[user.id] || [];
        const unreadCount = history.filter(msg => !msg.isOwn && !msg.read).length;
        if (unreadCount > 0) {
          const badge = document.createElement('span');
          badge.className = 'notification-badge';
          badge.textContent = unreadCount;
          li.appendChild(badge);
        }

        if (selectedUser && selectedUser.id === user.id) {
          li.classList.add('selected');
        }

        li.addEventListener('click', () => selectUser(user));
        userListEl.appendChild(li);
      });
    }

    // ---- Выбор собеседника ----
    function selectUser(user) {
      selectedUser = user;
      chatTitle.textContent = `Чат с ${user.name}`;
      messageInput.disabled = false;
      sendBtn.disabled = false;
      clearChatBtn.style.display = 'inline-block';
      messageInput.focus();

      if (chatHistory[user.id]) {
        chatHistory[user.id].forEach(msg => { msg.read = true; });
      }

      renderUserList();
      loadChatHistory(user.id);
      saveToStorage();

      if (window.innerWidth <= 768) {
        chatMain.classList.add('active');
      }
    }

    function loadChatHistory(peerId) {
      messagesDiv.innerHTML = '';
      const history = chatHistory[peerId] || [];
      history.forEach(msg => {
        displayMessage(msg, peerId);
      });
    }

    function closeChat() {
      selectedUser = null;
      chatTitle.textContent = 'Выберите собеседника';
      messageInput.disabled = true;
      sendBtn.disabled = true;
      clearChatBtn.style.display = 'none';
      messagesDiv.innerHTML = '';
      renderUserList();
      userListEl.scrollTop = 0;

      if (window.innerWidth <= 768) {
        chatMain.classList.remove('active');
      }
    }

    backBtn.addEventListener('click', closeChat);

    // ---- Очистка чата ----
    clearChatBtn.addEventListener('click', () => {
      if (!selectedUser) return;
      if (confirm('Очистить всю историю сообщений с этим пользователем?')) {
        socket.emit('clear chat', { peerId: selectedUser.id });
      }
    });

    // ---- Удаление сообщения ----
    function deleteMessage(messageId) {
      if (!selectedUser) return;
      if (confirm('Удалить это сообщение?')) {
        socket.emit('delete message', { messageId, peerId: selectedUser.id });
      }
    }

    // ---- Редактирование сообщения ----
    function editMessage(messageId, currentText) {
      currentEditMessageId = messageId;
      editTextarea.value = currentText;
      editModal.classList.add('active');
    }

    saveEditBtn.addEventListener('click', () => {
      const newText = editTextarea.value.trim();
      if (!newText || !selectedUser || !currentEditMessageId) return;
      socket.emit('edit message', {
        messageId: currentEditMessageId,
        peerId: selectedUser.id,
        newText
      });
      editModal.classList.remove('active');
      currentEditMessageId = null;
    });

    cancelEditBtn.addEventListener('click', () => {
      editModal.classList.remove('active');
      currentEditMessageId = null;
    });

    // Закрыть модалку при клике вне
    editModal.addEventListener('click', (e) => {
      if (e.target === editModal) {
        editModal.classList.remove('active');
        currentEditMessageId = null;
      }
    });

    // ---- Отправка сообщения (текст или картинка) ----
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text && !imageUpload.files.length) return;

      if (imageUpload.files.length) {
        const file = imageUpload.files[0];
        const formData = new FormData();
        formData.append('image', file);
        try {
          const res = await fetch('/upload', { method: 'POST', body: formData });
          const data = await res.json();
          socket.emit('private message', {
            to: selectedUser.id,
            text: text || '',
            imageUrl: data.url,
          });
        } catch (err) {
          console.error('Ошибка загрузки:', err);
        }
        imageUpload.value = '';
      } else {
        socket.emit('private message', {
          to: selectedUser.id,
          text,
        });
      }
      messageInput.value = '';
    }

    // ---- Вставка изображения из буфера (Ctrl+V) ----
    messageInput.addEventListener('paste', async (e) => {
      const items = (e.clipboardData || window.clipboardData).items;
      for (let item of items) {
        if (item.type.indexOf('image') === 0) {
          e.preventDefault();
          const file = item.getAsFile();
          const formData = new FormData();
          formData.append('image', file);
          try {
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            socket.emit('private message', {
              to: selectedUser.id,
              text: '',
              imageUrl: data.url,
            });
          } catch (err) {
            console.error('Ошибка загрузки из буфера:', err);
          }
          break;
        }
      }
    });

    // ---- Получение сообщения ----
    socket.on('private message', ({ from, fromName, to, text, imageUrl }) => {
      const isOwn = from === currentUser.id;
      const peerId = isOwn ? to : from;
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const messageId = generateMessageId();

      if (!chatHistory[peerId]) chatHistory[peerId] = [];
      const message = { id: messageId, fromName, text, imageUrl, isOwn, read: isOwn, time };
      chatHistory[peerId].push(message);
      saveToStorage();

      const isActiveChat = selectedUser && selectedUser.id === peerId;

      if (!isOwn) {
        if (isActiveChat) {
          playActiveChatSound();
        } else {
          playNotificationSound();
        }
      }

      if (isActiveChat) {
        displayMessage(message, peerId);
        if (!isOwn) message.read = true;
      }

      renderUserList();
    });

    // ---- Удаление сообщения (от сервера) ----
    socket.on('message deleted', ({ messageId, peerId }) => {
      if (chatHistory[peerId]) {
        chatHistory[peerId] = chatHistory[peerId].filter(msg => msg.id !== messageId);
        saveToStorage();
        if (selectedUser && selectedUser.id === peerId) {
          loadChatHistory(peerId);
        }
        renderUserList();
      }
    });

    // ---- Редактирование сообщения (от сервера) ----
    socket.on('message edited', ({ messageId, peerId, newText }) => {
      if (chatHistory[peerId]) {
        const msg = chatHistory[peerId].find(m => m.id === messageId);
        if (msg) {
          msg.text = newText;
          saveToStorage();
          if (selectedUser && selectedUser.id === peerId) {
            loadChatHistory(peerId);
          }
        }
      }
    });

    // ---- Очистка чата (от сервера) ----
    socket.on('chat cleared', ({ peerId }) => {
      if (chatHistory[peerId]) {
        chatHistory[peerId] = [];
        saveToStorage();
        if (selectedUser && selectedUser.id === peerId) {
          messagesDiv.innerHTML = '';
        }
        renderUserList();
      }
    });

    // ---- Отображение одного сообщения в DOM ----
    function displayMessage(msg, peerId) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${msg.isOwn ? 'own' : 'other'}`;
      messageDiv.dataset.messageId = msg.id;

      if (!msg.isOwn) {
        const nameSpan = document.createElement('div');
        nameSpan.className = 'sender';
        nameSpan.textContent = msg.fromName;
        messageDiv.appendChild(nameSpan);
      }

      if (msg.text) {
        const textSpan = document.createElement('div');
        textSpan.textContent = msg.text;
        messageDiv.appendChild(textSpan);
      }

      if (msg.imageUrl) {
        const img = document.createElement('img');
        img.src = msg.imageUrl;
        img.addEventListener('click', () => window.open(msg.imageUrl));
        messageDiv.appendChild(img);
      }

      const timeSpan = document.createElement('div');
      timeSpan.className = 'time';
      timeSpan.textContent = msg.time;
      messageDiv.appendChild(timeSpan);

      // Кнопки действий (только для своих сообщений)
      if (msg.isOwn) {
        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'message-actions';
        
        const editBtn = document.createElement('button');
        editBtn.textContent = '✏️';
        editBtn.title = 'Редактировать';
        editBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          editMessage(msg.id, msg.text || '');
        });

        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = '🗑️';
        deleteBtn.title = 'Удалить';
        deleteBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteMessage(msg.id);
        });

        actionsDiv.appendChild(editBtn);
        actionsDiv.appendChild(deleteBtn);
        messageDiv.appendChild(actionsDiv);
      }

      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // ---- Звуки ----
    function playNotificationSound() {
      playBeep(800, 0.2, 0.1);
    }

    function playActiveChatSound() {
      playBeep(600, 0.1, 0.05);
    }

    function playBeep(freq, gainValue, duration) {
      if (!audioContext) return;
      if (audioContext.state === 'suspended') {
        audioContext.resume().then(() => {
          beep(audioContext, freq, gainValue, duration);
        });
      } else {
        beep(audioContext, freq, gainValue, duration);
      }
    }

    function beep(ctx, freq, gainValue, duration) {
      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);
      oscillator.frequency.value = freq;
      gainNode.gain.value = gainValue;
      oscillator.start();
      oscillator.stop(ctx.currentTime + duration);
    }

    // ---- При загрузке страницы пытаемся восстановить сессию ----
    window.addEventListener('load', loadFromStorage);

    // ---- Обработка изменения размера окна ----
    window.addEventListener('resize', () => {
      if (window.innerWidth > 768) {
        chatMain.classList.remove('active');
      } else {
        if (selectedUser) {
          chatMain.classList.add('active');
        } else {
          chatMain.classList.remove('active');
        }
      }
    });

    // ---- Обработка выбора файла через кнопку ----
    uploadLabel.addEventListener('click', () => {
      imageUpload.click();
    });
  </script>
</body>
</html>
