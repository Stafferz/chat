<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Оранжевый чат</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #121212;
      overflow-x: hidden;
    }

    #login {
      background: #1e1e1e;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      width: 90%;
      max-width: 400px;
      text-align: center;
      color: #fff;
    }

    #login h2 {
      margin-bottom: 1.5rem;
      color: #ff8c00;
    }

    #login input {
      width: 100%;
      padding: 1rem;
      margin: 1rem 0;
      border: 1px solid #444;
      border-radius: 30px;
      font-size: 1rem;
      outline: none;
      background: #2a2a2a;
      color: #fff;
      transition: border 0.2s;
    }

    #login input:focus {
      border-color: #ff8c00;
    }

    #login button {
      padding: 1rem 2rem;
      background: #ff8c00;
      color: #121212;
      border: none;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }

    #login button:active {
      background: #e07b00;
    }

    #error {
      color: #ff6b6b;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    #chat {
      display: none;
      width: 100%;
      height: 100%;
      background: #121212;
      overflow-x: hidden;
    }

    .chat-container {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
      overflow-x: hidden;
    }

    .sidebar {
      width: 300px;
      background: #1e1e1e;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      padding: 1rem;
      background: #ff8c00;
      color: #121212;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
    }

    #change-nick-btn {
      background: transparent;
      border: 1px solid #121212;
      color: #121212;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
    }

    #change-nick-btn:active {
      background: rgba(0,0,0,0.1);
    }

    #chat-list {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #chat-list li {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 1.1rem;
      color: #fff;
      transition: background 0.2s;
      position: relative;
    }

    #chat-list li:active {
      background: #2a2a2a;
    }

    #chat-list li.selected {
      background: #b85e00;
      color: #121212;
      box-shadow: inset 0 0 0 1px rgba(255,140,0,0.5);
    }

    .chat-item {
      display: flex;
      align-items: center;
      flex: 1;
      min-width: 0;
      gap: 5px;
    }

    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 5px;
      flex-shrink: 0;
    }
    .status-online {
      background: #4caf50;
      box-shadow: 0 0 5px #4caf50;
    }
    .status-offline {
      background: #888;
    }

    .chat-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .typing-indicator-chat {
      font-size: 0.8rem;
      color: #ff8c00;
      margin-left: 5px;
      font-style: italic;
    }

    .notification-badge {
      background: #ff8c00;
      color: #121212;
      border-radius: 50%;
      min-width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: bold;
      padding: 0 4px;
      margin-left: 8px;
    }

    .delete-chat-btn {
      background: transparent;
      border: none;
      color: #ff8c00;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 5px;
      margin-left: 5px;
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    .delete-chat-btn:hover {
      opacity: 1;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #121212;
    }

    #chat-header {
      padding: 1rem;
      background: #1e1e1e;
      border-bottom: 1px solid #333;
      font-weight: bold;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #ff8c00;
      flex-wrap: wrap;
    }

    #back-btn {
      background: transparent;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.5rem 1rem;
      display: none;
      color: #ff8c00;
      font-weight: bold;
    }

    #back-btn:active {
      opacity: 0.6;
    }

    #clear-chat-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid #ff8c00;
      color: #ff8c00;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    #clear-chat-btn:active {
      background: rgba(255,140,0,0.2);
    }

    #typing-indicator-header {
      font-size: 0.9rem;
      color: #ff8c00;
      margin-left: 10px;
      font-style: italic;
    }

    #messages {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      max-width: 80%;
      margin-bottom: 0.25rem;
      padding: 0.75rem 1rem;
      border-radius: 20px;
      word-wrap: break-word;
      overflow-wrap: break-word;
      word-break: break-word;
      font-size: 1rem;
      line-height: 1.4;
    }

    .message.own {
      align-self: flex-end;
      background: #ff8c00;
      color: #121212;
      border-bottom-right-radius: 4px;
    }

    .message.other {
      align-self: flex-start;
      background: #2a2a2a;
      color: #fff;
      border-bottom-left-radius: 4px;
    }

    .message .sender {
      font-size: 0.85rem;
      font-weight: bold;
      margin-bottom: 0.25rem;
      color: #aaa;
    }

    .message .time {
      font-size: 0.7rem;
      margin-top: 4px;
      opacity: 0.7;
      text-align: right;
    }
    .message.own .time {
      color: #121212;
    }
    .message.other .time {
      color: #aaa;
    }

    .message img, .message video {
      max-width: 100%;
      max-height: 200px;
      border-radius: 8px;
      cursor: pointer;
      display: block;
      margin-top: 4px;
    }

    .input-area {
      display: flex;
      padding: 0.75rem;
      border-top: 1px solid #333;
      background: #1e1e1e;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    #message-input {
      flex: 1 1 200px;
      padding: 0.75rem 1rem;
      border: 1px solid #444;
      border-radius: 30px;
      font-size: 1rem;
      outline: none;
      min-width: 0;
      background: #2a2a2a;
      color: #fff;
    }

    #message-input:focus {
      border-color: #ff8c00;
    }

    #send-btn {
      padding: 0.75rem 1.5rem;
      background: #ff8c00;
      color: #121212;
      border: none;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      min-width: 80px;
      white-space: nowrap;
    }

    #send-btn:active {
      background: #e07b00;
    }

    #send-btn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    #image-upload {
      display: none;
    }

    .image-upload-label {
      background: #ff8c00;
      color: #121212;
      padding: 0.5rem 1rem;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    /* Мобильные стили: все на одной строке */
    @media (max-width: 768px) {
      body, #chat, .chat-container { overflow-x: hidden; }
      .chat-container { flex-direction: column; }
      .sidebar { width: 100%; height: 100%; border-right: none; }
      .main {
        width: 100%; height: 100%;
        position: absolute; top: 0; left: 0;
        background: #121212;
        transform: translateX(100%);
        transition: transform 0.3s ease;
        z-index: 10;
      }
      .main.active { transform: translateX(0); }
      #back-btn { display: inline-block; }
      #chat-list li { padding: 1rem; font-size: 1.2rem; }
      .notification-badge { min-width: 28px; height: 28px; font-size: 1rem; }

      /* Исправление: все в одной строке */
      .input-area {
        flex-wrap: nowrap;
        gap: 5px;
        padding: 0.5rem;
      }
      #message-input {
        flex: 1 1 auto;
        min-width: 100px;
        padding: 0.6rem 0.8rem;
        font-size: 1rem;
      }
      #send-btn {
        padding: 0.6rem 0.8rem;
        font-size: 0.9rem;
        min-width: 60px;
        white-space: nowrap;
      }
      .image-upload-label {
        padding: 0.5rem 0.8rem;
        font-size: 0.9rem;
        flex-shrink: 0;
      }
      #chat-header { padding: 1.2rem; font-size: 1.3rem; }
      #back-btn { font-size: 1.8rem; padding: 0.5rem 1rem 0.5rem 0.5rem; }
    }
  </style>
</head>
<body>
  <div id="login">
    <h2>Оранжевый чат</h2>
    <input type="text" id="name-input" placeholder="Ваше имя" autofocus>
    <button id="join-btn">Войти</button>
    <div id="error"></div>
  </div>

  <div id="chat">
    <div class="chat-container">
      <div class="sidebar">
        <div class="sidebar-header">
          <span>Чаты</span>
          <button id="change-nick-btn">Сменить ник</button>
        </div>
        <ul id="chat-list"></ul>
      </div>
      <div class="main" id="chat-main">
        <div id="chat-header">
          <button id="back-btn">←</button>
          <span id="chat-title">Выберите собеседника</span>
          <span id="typing-indicator-header"></span>
          <button id="clear-chat-btn" style="display: none;">Очистить чат</button>
        </div>
        <div id="messages"></div>
        <div class="input-area">
          <input type="text" id="message-input" placeholder="Сообщение" disabled>
          <label for="image-upload" class="image-upload-label" id="upload-label">📷/🎥</label>
          <input type="file" id="image-upload" accept="image/*,video/*">
          <button id="send-btn" disabled>Отправить</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    function generateClientId() {
      return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    }

    // Конвертация base64 в Uint8Array для VAPID ключа
    function urlB64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
      const rawData = window.atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; ++i) {
        outputArray[i] = rawData.charCodeAt(i);
      }
      return outputArray;
    }

    // Элементы DOM
    const loginDiv = document.getElementById('login');
    const chatDiv = document.getElementById('chat');
    const nameInput = document.getElementById('name-input');
    const joinBtn = document.getElementById('join-btn');
    const errorDiv = document.getElementById('error');
    const chatListEl = document.getElementById('chat-list');
    const chatMain = document.getElementById('chat-main');
    const chatTitle = document.getElementById('chat-title');
    const typingIndicatorHeader = document.getElementById('typing-indicator-header');
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const backBtn = document.getElementById('back-btn');
    const changeNickBtn = document.getElementById('change-nick-btn');
    const clearChatBtn = document.getElementById('clear-chat-btn');
    const imageUpload = document.getElementById('image-upload');
    const uploadLabel = document.getElementById('upload-label');

    // Состояние
    let currentUser = null;
    let selectedUser = null;
    let onlineUsers = [];
    let chatHistory = {};
    let audioContext = null;
    let typingTimer = null;
    let pushSubscriptionAttempted = false;

    // Загрузка из localStorage (с преобразованием старой структуры)
    function loadFromStorage() {
      const savedName = localStorage.getItem('userName');
      const savedId = localStorage.getItem('userId');
      if (savedName && savedId) {
        currentUser = { id: savedId, name: savedName };
        nameInput.value = savedName;
        const savedHistory = localStorage.getItem('chatHistory');
        if (savedHistory) {
          try {
            const parsed = JSON.parse(savedHistory);
            if (Array.isArray(parsed)) {
              const newHistory = {};
              for (let peerId in parsed) {
                const msgs = parsed[peerId];
                if (Array.isArray(msgs)) {
                  let peerName = null;
                  for (let i = msgs.length - 1; i >= 0; i--) {
                    if (!msgs[i].isOwn) {
                      peerName = msgs[i].fromName;
                      break;
                    }
                  }
                  if (!peerName && msgs.length > 0) peerName = msgs[0].fromName;
                  newHistory[peerId] = { messages: msgs, peerName: peerName || 'Неизвестно', isTyping: false };
                }
              }
              chatHistory = newHistory;
            } else if (typeof parsed === 'object' && parsed !== null) {
              chatHistory = parsed;
              for (let peerId in chatHistory) {
                if (chatHistory[peerId].isTyping === undefined) chatHistory[peerId].isTyping = false;
                if (!chatHistory[peerId].peerName && chatHistory[peerId].messages.length > 0) {
                  const msgs = chatHistory[peerId].messages;
                  for (let i = msgs.length - 1; i >= 0; i--) {
                    if (!msgs[i].isOwn) {
                      chatHistory[peerId].peerName = msgs[i].fromName;
                      break;
                    }
                  }
                  if (!chatHistory[peerId].peerName) chatHistory[peerId].peerName = msgs[0]?.fromName || 'Неизвестно';
                }
              }
            }
          } catch (e) { console.warn('Ошибка парсинга истории', e); }
        }
        loginDiv.style.display = 'none';
        chatDiv.style.display = 'flex';
        socket.emit('join', { name: savedName, userId: savedId });
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function saveToStorage() {
      if (currentUser) {
        localStorage.setItem('userName', currentUser.name);
        localStorage.setItem('userId', currentUser.id);
        localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
      }
    }

    function clearStorageAndRelogin() {
      localStorage.removeItem('userName');
      localStorage.removeItem('userId');
      localStorage.removeItem('chatHistory');
      currentUser = null;
      selectedUser = null;
      chatHistory = {};
      location.reload();
    }

    joinBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if (!name) return;
      let userId = localStorage.getItem('userId');
      if (!userId) {
        userId = generateClientId();
        localStorage.setItem('userId', userId);
      }
      socket.emit('join', { name, userId });
      if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
    });

    nameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') joinBtn.click(); });
    changeNickBtn.addEventListener('click', clearStorageAndRelogin);

    socket.on('joinError', (msg) => {
      errorDiv.textContent = msg;
      if (currentUser) clearStorageAndRelogin();
    });

    socket.on('joined', (user) => {
      currentUser = user;
      localStorage.setItem('userName', user.name);
      localStorage.setItem('userId', user.id);
      if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
      loginDiv.style.display = 'none';
      chatDiv.style.display = 'flex';
      // Подписка на push
      subscribeToPush();
    });

    socket.on('kicked', (data) => {
      if (data.userId === currentUser?.id) { alert(data.message); location.reload(); }
    });

    // Подписка на push-уведомления (исправленная)
    async function subscribeToPush() {
      if (pushSubscriptionAttempted) return;
      pushSubscriptionAttempted = true;

      if (!('Notification' in window)) { console.log('Notification не поддерживается'); return; }
      if (!('serviceWorker' in navigator)) { console.log('ServiceWorker не поддерживается'); return; }
      if (!('PushManager' in window)) { console.log('PushManager не поддерживается'); return; }

      if (Notification.permission === 'denied') {
        console.log('Уведомления заблокированы пользователем');
        return;
      }

      if (Notification.permission === 'granted') {
        try {
          console.log('Регистрация service worker...');
          const registration = await navigator.serviceWorker.register('/service-worker.js');
          console.log('Service worker зарегистрирован', registration);

          await navigator.serviceWorker.ready;
          console.log('Service worker готов');

          // Удаляем старую подписку, если есть
          const existingSubscription = await registration.pushManager.getSubscription();
          if (existingSubscription) {
            console.log('Удаляем старую подписку');
            await existingSubscription.unsubscribe();
          }

          console.log('Подписка на push...');
          // ВАЖНО: замените строку ниже на ваш актуальный публичный ключ
          const subscription = await registration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlB64ToUint8Array('BK0ZuTTtvnwKTDxfjMrMTeYWoAejPX_J6PIHPMwvx6b5J3V3LuM8MV91d1wbb_kDj7huTVQgryycEgzCTIKdcNk')
          });
          console.log('Подписка получена', subscription);

          const res = await fetch('/api/subscribe', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              userId: currentUser.id,
              subscription: subscription
            })
          });
          if (res.ok) {
            console.log('Подписка отправлена на сервер');
          } else {
            console.error('Ошибка сохранения подписки', await res.text());
          }
        } catch (err) {
          console.error('Ошибка подписки на push:', err);
        }
      } else {
        console.log('Запрашиваем разрешение на уведомления');
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
          await subscribeToPush();
        }
      }
    }

    // Обновление списка онлайн
    socket.on('user list', (online) => {
      onlineUsers = online;
      online.forEach(u => {
        if (chatHistory[u.id]) {
          chatHistory[u.id].messages.forEach(msg => { if (!msg.isOwn) msg.fromName = u.name; });
          chatHistory[u.id].peerName = u.name;
        }
      });
      buildChatList();
    });

    function buildChatList() {
      const allChats = [];
      onlineUsers.filter(u => u.id !== currentUser?.id).forEach(u => allChats.push({ id: u.id, name: u.name, online: true }));
      Object.keys(chatHistory).forEach(peerId => {
        if (peerId !== currentUser?.id && !onlineUsers.some(u => u.id === peerId)) {
          const peerName = chatHistory[peerId].peerName || 'Неизвестно';
          allChats.push({ id: peerId, name: peerName, online: false });
        }
      });
      const unique = Array.from(new Map(allChats.map(item => [item.id, item])).values());
      renderChatList(unique);
    }

    function renderChatList(chats) {
      chatListEl.innerHTML = '';
      chats.forEach(chat => {
        const li = document.createElement('li');
        li.dataset.id = chat.id;

        const chatItemDiv = document.createElement('div');
        chatItemDiv.className = 'chat-item';
        const statusSpan = document.createElement('span');
        statusSpan.className = `status-indicator ${chat.online ? 'status-online' : 'status-offline'}`;
        const nameSpan = document.createElement('span');
        nameSpan.className = 'chat-name';
        nameSpan.textContent = chat.name;
        chatItemDiv.appendChild(statusSpan);
        chatItemDiv.appendChild(nameSpan);
        if (chat.online && chatHistory[chat.id]?.isTyping) {
          const typingSpan = document.createElement('span');
          typingSpan.className = 'typing-indicator-chat';
          typingSpan.textContent = '✏️';
          chatItemDiv.appendChild(typingSpan);
        }
        li.appendChild(chatItemDiv);

        const history = chatHistory[chat.id]?.messages || [];
        const unreadCount = history.filter(msg => !msg.isOwn && !msg.read).length;
        if (unreadCount > 0) {
          const badge = document.createElement('span');
          badge.className = 'notification-badge';
          badge.textContent = unreadCount;
          li.appendChild(badge);
        }

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-chat-btn';
        deleteBtn.textContent = '❌';
        deleteBtn.title = 'Удалить чат';
        deleteBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteChat(chat.id); });
        li.appendChild(deleteBtn);

        if (selectedUser && selectedUser.id === chat.id) li.classList.add('selected');
        li.addEventListener('click', () => selectUser(chat));
        chatListEl.appendChild(li);
      });
    }

    function deleteChat(peerId) {
      if (!confirm('Удалить историю переписки с этим пользователем? Это действие необратимо.')) return;
      delete chatHistory[peerId];
      saveToStorage();
      if (selectedUser && selectedUser.id === peerId) closeChat();
      buildChatList();
    }

    function selectUser(chat) {
      selectedUser = chat;
      chatTitle.textContent = `Чат с ${chat.name}`;
      typingIndicatorHeader.textContent = '';

      messageInput.disabled = false;
      sendBtn.disabled = false;

      if (!chat.online) chatTitle.textContent += ' (офлайн)';

      if (!chatHistory[chat.id]) {
        chatHistory[chat.id] = { messages: [], peerName: chat.name, isTyping: false };
      } else {
        chatHistory[chat.id].peerName = chat.name;
      }

      clearChatBtn.style.display = 'inline-block';
      messageInput.focus();

      if (chatHistory[chat.id]) {
        chatHistory[chat.id].messages.forEach(msg => { msg.read = true; });
      }

      buildChatList();
      loadChatHistory(chat.id);
      saveToStorage();

      if (window.innerWidth <= 768) chatMain.classList.add('active');
    }

    function loadChatHistory(peerId) {
      messagesDiv.innerHTML = '';
      const history = chatHistory[peerId]?.messages || [];
      history.forEach(msg => displayMessage(msg));
    }

    function closeChat() {
      selectedUser = null;
      chatTitle.textContent = 'Выберите собеседника';
      typingIndicatorHeader.textContent = '';
      messageInput.disabled = true;
      sendBtn.disabled = true;
      clearChatBtn.style.display = 'none';
      messagesDiv.innerHTML = '';
      buildChatList();
      chatListEl.scrollTop = 0;
      if (window.innerWidth <= 768) chatMain.classList.remove('active');
    }

    backBtn.addEventListener('click', closeChat);

    clearChatBtn.addEventListener('click', () => {
      if (!selectedUser) return;
      if (confirm('Очистить всю историю сообщений с этим пользователем?')) {
        socket.emit('clear chat', { peerId: selectedUser.id });
      }
    });

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    messageInput.addEventListener('input', () => {
      if (!selectedUser || !selectedUser.online) return;
      socket.emit('typing', { to: selectedUser.id });
      if (typingTimer) clearTimeout(typingTimer);
      typingTimer = setTimeout(() => { socket.emit('stop typing', { to: selectedUser.id }); }, 2000);
    });

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text && !imageUpload.files.length) return;

      if (typingTimer) { clearTimeout(typingTimer); socket.emit('stop typing', { to: selectedUser.id }); }

      if (imageUpload.files.length) {
        const file = imageUpload.files[0];
        const formData = new FormData();
        formData.append('image', file);

        const originalText = sendBtn.textContent;
        sendBtn.textContent = '0%';
        sendBtn.disabled = true;

        try {
          const xhr = new XMLHttpRequest();
          xhr.open('POST', '/upload', true);
          xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
              const percent = Math.round((e.loaded / e.total) * 100);
              sendBtn.textContent = percent + '%';
            }
          };
          xhr.onload = () => {
            if (xhr.status === 200) {
              const data = JSON.parse(xhr.responseText);
              socket.emit('private message', {
                to: selectedUser.id,
                text: text || '',
                imageUrl: data.url,
              });
              playSelfSendSound();
            } else {
              alert('Ошибка загрузки');
            }
            sendBtn.textContent = originalText;
            sendBtn.disabled = false;
          };
          xhr.onerror = () => {
            alert('Ошибка сети');
            sendBtn.textContent = originalText;
            sendBtn.disabled = false;
          };
          xhr.send(formData);
        } catch (err) {
          console.error('Ошибка загрузки:', err);
          sendBtn.textContent = originalText;
          sendBtn.disabled = false;
        }
        imageUpload.value = '';
      } else {
        socket.emit('private message', { to: selectedUser.id, text });
        playSelfSendSound();
        messageInput.value = '';
      }
    }

    // Вставка из буфера
    messageInput.addEventListener('paste', async (e) => {
      const items = (e.clipboardData || window.clipboardData).items;
      for (let item of items) {
        if (item.type.indexOf('image') === 0 || item.type.indexOf('video') === 0) {
          e.preventDefault();
          const file = item.getAsFile();
          const formData = new FormData();
          formData.append('image', file);
          try {
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            socket.emit('private message', {
              to: selectedUser.id,
              text: '',
              imageUrl: data.url,
            });
            playSelfSendSound();
          } catch (err) { console.error('Ошибка загрузки из буфера:', err); }
          break;
        }
      }
    });

    // Получение сообщения
    socket.on('private message', ({ from, fromName, to, text, imageUrl }) => {
      const isOwn = from === currentUser.id;
      const peerId = isOwn ? to : from;
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const messageId = 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

      if (!chatHistory[peerId]) chatHistory[peerId] = { messages: [], peerName: null, isTyping: false };
      const message = { id: messageId, fromName, text, imageUrl, isOwn, read: isOwn, time };
      chatHistory[peerId].messages.push(message);
      if (!isOwn) chatHistory[peerId].peerName = fromName;
      saveToStorage();

      const isActiveChat = selectedUser && selectedUser.id === peerId;
      if (!isOwn) {
        if (isActiveChat) playActiveChatSound(); else playNotificationSound();
      }
      if (isActiveChat) {
        displayMessage(message);
        if (!isOwn) message.read = true;
      }
      buildChatList();
    });

    // Очистка чата (от сервера)
    socket.on('chat cleared', ({ peerId }) => {
      if (chatHistory[peerId]) {
        chatHistory[peerId].messages = [];
        saveToStorage();
        if (selectedUser && selectedUser.id === peerId) messagesDiv.innerHTML = '';
        buildChatList();
      }
    });

    // Индикатор печатает
    socket.on('typing', ({ from, fromName }) => {
      if (chatHistory[from]) { chatHistory[from].isTyping = true; buildChatList(); }
      if (selectedUser && selectedUser.id === from) typingIndicatorHeader.textContent = `${fromName} печатает...`;
    });

    socket.on('stop typing', ({ from }) => {
      if (chatHistory[from]) { chatHistory[from].isTyping = false; buildChatList(); }
      if (selectedUser && selectedUser.id === from) typingIndicatorHeader.textContent = '';
    });

    function isVideoUrl(url) {
      return /\.(mp4|webm|ogg|mov|avi)$/i.test(url);
    }

    function displayMessage(msg) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${msg.isOwn ? 'own' : 'other'}`;
      messageDiv.dataset.messageId = msg.id;

      if (!msg.isOwn) {
        const nameSpan = document.createElement('div');
        nameSpan.className = 'sender';
        nameSpan.textContent = msg.fromName;
        messageDiv.appendChild(nameSpan);
      }
      if (msg.text) {
        const textSpan = document.createElement('div');
        textSpan.textContent = msg.text;
        messageDiv.appendChild(textSpan);
      }
      if (msg.imageUrl) {
        if (isVideoUrl(msg.imageUrl)) {
          const video = document.createElement('video');
          video.src = msg.imageUrl;
          video.controls = true;
          video.style.maxWidth = '100%';
          video.style.maxHeight = '200px';
          video.addEventListener('click', (e) => {
            e.stopPropagation();
            window.open(msg.imageUrl);
          });
          messageDiv.appendChild(video);
        } else {
          const img = document.createElement('img');
          img.src = msg.imageUrl;
          img.addEventListener('click', () => window.open(msg.imageUrl));
          messageDiv.appendChild(img);
        }
      }

      const timeSpan = document.createElement('div');
      timeSpan.className = 'time';
      timeSpan.textContent = msg.time;
      messageDiv.appendChild(timeSpan);

      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Звуки с исправлением AudioContext
    function playNotificationSound() { playBeep(800, 0.2, 0.1); }
    function playActiveChatSound() { playBeep(600, 0.1, 0.05); }
    function playSelfSendSound() { playBeep(600, 0.1, 0.05); }

    function playBeep(freq, gainValue, duration) {
      if (!audioContext) return;
      if (audioContext.state === 'suspended') {
        // Ждем следующего взаимодействия
        document.addEventListener('click', function initAudio() {
          audioContext.resume().then(() => {
            beep(audioContext, freq, gainValue, duration);
            document.removeEventListener('click', initAudio);
          });
        }, { once: true });
      } else if (audioContext.state === 'running') {
        beep(audioContext, freq, gainValue, duration);
      }
    }

    function beep(ctx, freq, gainValue, duration) {
      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);
      oscillator.frequency.value = freq;
      gainNode.gain.value = gainValue;
      oscillator.start();
      oscillator.stop(ctx.currentTime + duration);
    }

    window.addEventListener('load', loadFromStorage);
    window.addEventListener('resize', () => {
      if (window.innerWidth > 768) chatMain.classList.remove('active');
      else if (selectedUser) chatMain.classList.add('active'); else chatMain.classList.remove('active');
    });
  </script>
</body>
</html>
