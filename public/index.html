<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мессенджер с историей и звуком</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f0f0;
    }
    #login {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 300px;
      text-align: center;
    }
    #login input {
      width: 100%;
      padding: 0.5rem;
      margin: 1rem 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #login button {
      padding: 0.5rem 1rem;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #error {
      color: red;
      margin-top: 0.5rem;
    }
    #chat {
      display: none;
      width: 100%;
      height: 100%;
      background: white;
    }
    .sidebar {
      width: 250px;
      background: #f8f9fa;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
    }
    .sidebar h3 {
      padding: 1rem;
      background: #007bff;
      color: white;
      margin: 0;
    }
    #user-list {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      padding: 0;
    }
    #user-list li {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #user-list li:hover {
      background: #e9ecef;
    }
    #user-list li.selected {
      background: #007bff;
      color: white;
    }
    .notification-badge {
      background: red;
      color: white;
      border-radius: 50%;
      padding: 0.2rem 0.5rem;
      font-size: 0.8rem;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    #chat-header {
      padding: 1rem;
      background: #f8f9fa;
      border-bottom: 1px solid #ddd;
      font-weight: bold;
    }
    #messages {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .message {
      max-width: 60%;
      margin-bottom: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 1rem;
      word-wrap: break-word;
    }
    .message.own {
      align-self: flex-end;
      background: #007bff;
      color: white;
    }
    .message.other {
      align-self: flex-start;
      background: #e9ecef;
    }
    .message .sender {
      font-size: 0.8rem;
      font-weight: bold;
      margin-bottom: 0.2rem;
    }
    .input-area {
      display: flex;
      padding: 1rem;
      border-top: 1px solid #ddd;
    }
    #message-input {
      flex: 1;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-right: 0.5rem;
    }
    #send-btn {
      padding: 0.5rem 1rem;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="login">
    <h2>Вход в чат</h2>
    <input type="text" id="name-input" placeholder="Ваше имя" autofocus>
    <button id="join-btn">Присоединиться</button>
    <div id="error"></div>
  </div>

  <div id="chat">
    <div class="sidebar">
      <h3>Участники онлайн</h3>
      <ul id="user-list"></ul>
    </div>
    <div class="main">
      <div id="chat-header">Выберите собеседника</div>
      <div id="messages"></div>
      <div class="input-area">
        <input type="text" id="message-input" placeholder="Сообщение" disabled>
        <button id="send-btn" disabled>Отправить</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    // Элементы DOM
    const loginDiv = document.getElementById('login');
    const chatDiv = document.getElementById('chat');
    const nameInput = document.getElementById('name-input');
    const joinBtn = document.getElementById('join-btn');
    const errorDiv = document.getElementById('error');
    const userListEl = document.getElementById('user-list');
    const chatHeader = document.getElementById('chat-header');
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');

    // Состояние
    let currentUser = null;          // { id, name }
    let selectedUser = null;         // { id, name }
    let users = [];                  // все онлайн пользователи
    let chatHistory = {};            // { peerId: [message] }
    let audioContext = null;         // для звука

    // ---- Вход ----
    joinBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if (!name) return;
      socket.emit('join', name);
      
      // Инициализация аудиоконтекста после жеста пользователя
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    });

    nameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') joinBtn.click();
    });

    socket.on('joinError', (msg) => {
      errorDiv.textContent = msg;
    });

    socket.on('joined', (user) => {
      currentUser = user;
      loginDiv.style.display = 'none';
      chatDiv.style.display = 'flex';
    });

    // ---- Обновление списка пользователей ----
    socket.on('user list', (onlineUsers) => {
      users = onlineUsers.filter(u => u.id !== currentUser?.id);
      renderUserList();

      // Если выбранный пользователь вышел, сбрасываем чат
      if (selectedUser && !users.find(u => u.id === selectedUser.id)) {
        selectedUser = null;
        chatHeader.textContent = 'Выберите собеседника';
        messagesDiv.innerHTML = '';
        messageInput.disabled = true;
        sendBtn.disabled = true;
      }
    });

    function renderUserList() {
      userListEl.innerHTML = '';
      users.forEach(user => {
        const li = document.createElement('li');
        li.dataset.id = user.id;
        
        const nameSpan = document.createElement('span');
        nameSpan.textContent = user.name;
        li.appendChild(nameSpan);

        // Если есть непрочитанные сообщения в истории, показываем бейдж
        const history = chatHistory[user.id] || [];
        const unreadCount = history.filter(msg => !msg.isOwn && !msg.read).length;
        if (unreadCount > 0) {
          const badge = document.createElement('span');
          badge.className = 'notification-badge';
          badge.textContent = unreadCount;
          li.appendChild(badge);
        }

        if (selectedUser && selectedUser.id === user.id) {
          li.classList.add('selected');
        }

        li.addEventListener('click', () => selectUser(user));
        userListEl.appendChild(li);
      });
    }

    // ---- Выбор собеседника ----
    function selectUser(user) {
      selectedUser = user;
      chatHeader.textContent = `Чат с ${user.name}`;
      messageInput.disabled = false;
      sendBtn.disabled = false;
      messageInput.focus();

      // Помечаем все сообщения этого чата как прочитанные
      if (chatHistory[user.id]) {
        chatHistory[user.id].forEach(msg => { msg.read = true; });
      }

      // Обновляем список пользователей (чтобы убрать бейдж)
      renderUserList();

      // Загружаем историю сообщений
      messagesDiv.innerHTML = '';
      const history = chatHistory[user.id] || [];
      history.forEach(msg => {
        addMessageToChat(msg.fromName, msg.text, msg.isOwn);
      });
    }

    // ---- Отправка сообщения ----
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !selectedUser) return;

      socket.emit('private message', {
        to: selectedUser.id,
        text,
      });

      messageInput.value = '';
      // Не добавляем сообщение сразу – дожидаемся эха от сервера
    }

    // ---- Получение сообщения (свои и чужие) ----
    socket.on('private message', ({ from, fromName, to, text }) => {
      const isOwn = from === currentUser.id;
      // Собеседник: для своего сообщения – to, для чужого – from
      const peerId = isOwn ? to : from;

      // Сохраняем в историю
      if (!chatHistory[peerId]) chatHistory[peerId] = [];
      const message = { fromName, text, isOwn, read: isOwn }; // свои сразу считаем прочитанными
      chatHistory[peerId].push(message);

      // Если это сообщение от другого и не в текущем чате – звук
      if (!isOwn && (!selectedUser || selectedUser.id !== peerId)) {
        playNotificationSound();
      }

      // Если открыт чат с этим собеседником, показываем сообщение
      if (selectedUser && selectedUser.id === peerId) {
        addMessageToChat(fromName, text, isOwn);
        // Если это чужое сообщение, помечаем как прочитанное
        if (!isOwn) {
          message.read = true;
        }
      }

      // Обновляем список пользователей (для бейджей)
      renderUserList();
    });

    // ---- Добавление сообщения в DOM ----
    function addMessageToChat(senderName, text, isOwn) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isOwn ? 'own' : 'other'}`;
      if (!isOwn) {
        const nameSpan = document.createElement('div');
        nameSpan.className = 'sender';
        nameSpan.textContent = senderName;
        messageDiv.appendChild(nameSpan);
      }
      const textSpan = document.createElement('div');
      textSpan.textContent = text;
      messageDiv.appendChild(textSpan);
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // ---- Звуковое уведомление ----
    function playNotificationSound() {
      if (!audioContext) return; // на всякий случай

      if (audioContext.state === 'suspended') {
        audioContext.resume().then(() => {
          beep(audioContext);
        });
      } else {
        beep(audioContext);
      }
    }

    function beep(ctx) {
      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);
      oscillator.frequency.value = 800;
      gainNode.gain.value = 0.2;
      oscillator.start();
      oscillator.stop(ctx.currentTime + 0.1);
    }
  </script>
</body>
</html>
