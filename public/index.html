<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Мобильный мессенджер</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f0f0;
      overflow-x: hidden; /* предотвращает горизонтальный скролл на мобильных */
    }

    /* Экран входа */
    #login {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    #login h2 {
      margin-bottom: 1.5rem;
      color: #333;
    }

    #login input {
      width: 100%;
      padding: 1rem;
      margin: 1rem 0;
      border: 1px solid #ddd;
      border-radius: 30px;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }

    #login input:focus {
      border-color: #007bff;
    }

    #login button {
      padding: 1rem 2rem;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }

    #login button:active {
      background: #0056b3;
    }

    #error {
      color: red;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    /* Основной интерфейс чата */
    #chat {
      display: none;
      width: 100%;
      height: 100%;
      background: white;
      overflow-x: hidden; /* для мобильных */
    }

    .chat-container {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative; /* для правильного позиционирования .main на мобильных */
      overflow-x: hidden; /* предотвращает появление полосы прокрутки при трансформации */
    }

    .sidebar {
      width: 300px;
      background: #f8f9fa;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }

    .sidebar h3 {
      padding: 1.2rem 1rem;
      background: #007bff;
      color: white;
      margin: 0;
      font-size: 1.2rem;
    }

    #user-list {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #user-list li {
      padding: 1rem;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.1rem;
      transition: background 0.2s;
    }

    #user-list li:active {
      background: #e9ecef;
    }

    #user-list li.selected {
      background: #007bff;
      color: white;
    }

    .notification-badge {
      background: red;
      color: white;
      border-radius: 50%;
      min-width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: bold;
      padding: 0 4px;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    #chat-header {
      padding: 1rem;
      background: #f8f9fa;
      border-bottom: 1px solid #ddd;
      font-weight: bold;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #back-btn {
      background: transparent;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.5rem 1rem;
      display: none; /* по умолчанию скрыта */
      color: #007bff;
      font-weight: bold;
    }

    #back-btn:active {
      opacity: 0.6;
    }

    #messages {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      max-width: 80%;
      margin-bottom: 0.25rem;
      padding: 0.75rem 1rem;
      border-radius: 20px;
      word-wrap: break-word;
      font-size: 1rem;
      line-height: 1.4;
    }

    .message.own {
      align-self: flex-end;
      background: #007bff;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.other {
      align-self: flex-start;
      background: #e9ecef;
      border-bottom-left-radius: 4px;
    }

    .message .sender {
      font-size: 0.85rem;
      font-weight: bold;
      margin-bottom: 0.25rem;
      color: #555;
    }

    .message .time {
      font-size: 0.7rem;
      margin-top: 4px;
      opacity: 0.7;
      text-align: right;
    }
    .message.own .time {
      color: rgba(255,255,255,0.8);
    }
    .message.other .time {
      color: #666;
    }

    .input-area {
      display: flex;
      padding: 0.75rem;
      border-top: 1px solid #ddd;
      background: #f8f9fa;
      gap: 8px;
      align-items: center;
    }

    #message-input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid #ccc;
      border-radius: 30px;
      font-size: 1rem;
      outline: none;
      min-width: 0; /* предотвращает переполнение */
    }

    #message-input:focus {
      border-color: #007bff;
    }

    #send-btn {
      padding: 0.75rem 1.5rem;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      min-width: 80px;
      white-space: nowrap;
    }

    #send-btn:active {
      background: #0056b3;
    }

    #send-btn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    /* Мобильные стили (ширина экрана до 768px) */
    @media (max-width: 768px) {
      body, #chat, .chat-container {
        overflow-x: hidden;
      }

      .chat-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 100%;
        border-right: none;
      }

      .main {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        background: white;
        transform: translateX(100%);
        transition: transform 0.3s ease;
        z-index: 10;
      }

      .main.active {
        transform: translateX(0);
      }

      #back-btn {
        display: inline-block;
      }

      /* Увеличиваем размеры для тач-управления */
      #user-list li {
        padding: 1.2rem 1rem;
        font-size: 1.2rem;
      }

      .notification-badge {
        min-width: 28px;
        height: 28px;
        font-size: 1rem;
      }

      /* Уменьшаем отступы кнопки, чтобы она помещалась в строку */
      #send-btn {
        padding: 0.7rem 1.2rem;
        font-size: 1rem;
        min-width: 70px;
      }

      #message-input {
        padding: 0.7rem 1rem;
        font-size: 1rem;
      }

      #chat-header {
        padding: 1.2rem;
        font-size: 1.3rem;
      }

      #back-btn {
        font-size: 1.8rem;
        padding: 0.5rem 1rem 0.5rem 0.5rem;
      }
    }

    /* Для очень маленьких экранов (до 480px) */
    @media (max-width: 480px) {
      .message {
        max-width: 90%;
        font-size: 1rem;
      }

      #login {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div id="login">
    <h2>Вход в чат</h2>
    <input type="text" id="name-input" placeholder="Ваше имя" autofocus>
    <button id="join-btn">Присоединиться</button>
    <div id="error"></div>
  </div>

  <div id="chat">
    <div class="chat-container">
      <div class="sidebar">
        <h3>Участники онлайн</h3>
        <ul id="user-list"></ul>
      </div>
      <div class="main" id="chat-main">
        <div id="chat-header">
          <button id="back-btn">←</button>
          <span id="chat-title">Выберите собеседника</span>
        </div>
        <div id="messages"></div>
        <div class="input-area">
          <input type="text" id="message-input" placeholder="Сообщение" disabled>
          <button id="send-btn" disabled>Отправить</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    // Элементы DOM
    const loginDiv = document.getElementById('login');
    const chatDiv = document.getElementById('chat');
    const nameInput = document.getElementById('name-input');
    const joinBtn = document.getElementById('join-btn');
    const errorDiv = document.getElementById('error');
    const userListEl = document.getElementById('user-list');
    const chatMain = document.getElementById('chat-main');
    const chatTitle = document.getElementById('chat-title');
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const backBtn = document.getElementById('back-btn');

    // Состояние
    let currentUser = null;
    let selectedUser = null;
    let users = [];
    let chatHistory = {}; // peerId -> массив сообщений { fromName, text, isOwn, read, time }
    let audioContext = null;

    // ---- Вход ----
    joinBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if (!name) return;
      socket.emit('join', name);
      // Инициализация аудио после жеста пользователя
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    });

    nameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') joinBtn.click();
    });

    socket.on('joinError', (msg) => {
      errorDiv.textContent = msg;
    });

    socket.on('joined', (user) => {
      currentUser = user;
      loginDiv.style.display = 'none';
      chatDiv.style.display = 'flex';
    });

    // ---- Обновление списка пользователей ----
    socket.on('user list', (onlineUsers) => {
      users = onlineUsers.filter(u => u.id !== currentUser?.id);
      renderUserList();

      // Если выбранный пользователь вышел, закрываем чат
      if (selectedUser && !users.find(u => u.id === selectedUser.id)) {
        closeChat();
      }
    });

    function renderUserList() {
      userListEl.innerHTML = '';
      users.forEach(user => {
        const li = document.createElement('li');
        li.dataset.id = user.id;
        
        const nameSpan = document.createElement('span');
        nameSpan.textContent = user.name;
        li.appendChild(nameSpan);

        const history = chatHistory[user.id] || [];
        const unreadCount = history.filter(msg => !msg.isOwn && !msg.read).length;
        if (unreadCount > 0) {
          const badge = document.createElement('span');
          badge.className = 'notification-badge';
          badge.textContent = unreadCount;
          li.appendChild(badge);
        }

        if (selectedUser && selectedUser.id === user.id) {
          li.classList.add('selected');
        }

        li.addEventListener('click', () => selectUser(user));
        userListEl.appendChild(li);
      });
    }

    // ---- Выбор собеседника ----
    function selectUser(user) {
      selectedUser = user;
      chatTitle.textContent = `Чат с ${user.name}`;
      messageInput.disabled = false;
      sendBtn.disabled = false;
      messageInput.focus();

      // Помечаем сообщения прочитанными
      if (chatHistory[user.id]) {
        chatHistory[user.id].forEach(msg => { msg.read = true; });
      }

      renderUserList();
      loadChatHistory(user.id);

      // На мобильных устройствах показываем окно чата
      if (window.innerWidth <= 768) {
        chatMain.classList.add('active');
      }
    }

    // Загрузить историю сообщений для выбранного пользователя
    function loadChatHistory(peerId) {
      messagesDiv.innerHTML = '';
      const history = chatHistory[peerId] || [];
      history.forEach(msg => {
        addMessageToChat(msg.fromName, msg.text, msg.isOwn, msg.time);
      });
    }

    // ---- Закрыть чат (кнопка назад) ----
    function closeChat() {
      selectedUser = null;
      chatTitle.textContent = 'Выберите собеседника';
      messageInput.disabled = true;
      sendBtn.disabled = true;
      messagesDiv.innerHTML = '';
      renderUserList();

      // Прокручиваем список пользователей вверх
      userListEl.scrollTop = 0;

      if (window.innerWidth <= 768) {
        chatMain.classList.remove('active');
      }
    }

    backBtn.addEventListener('click', closeChat);

    // ---- Отправка сообщения ----
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !selectedUser) return;

      socket.emit('private message', {
        to: selectedUser.id,
        text,
      });

      messageInput.value = '';
      // Сообщение добавится после получения эха от сервера (в обработчике socket.on)
    }

    // ---- Получение сообщения (свои и чужие) ----
    socket.on('private message', ({ from, fromName, to, text }) => {
      const isOwn = from === currentUser.id;
      const peerId = isOwn ? to : from;
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      if (!chatHistory[peerId]) chatHistory[peerId] = [];
      const message = { fromName, text, isOwn, read: isOwn, time };
      chatHistory[peerId].push(message);

      // Если сообщение от другого и не в текущем чате – звук
      if (!isOwn && (!selectedUser || selectedUser.id !== peerId)) {
        playNotificationSound();
      }

      // Если открыт чат с этим собеседником, показываем сообщение
      if (selectedUser && selectedUser.id === peerId) {
        addMessageToChat(fromName, text, isOwn, time);
        if (!isOwn) message.read = true;
      }

      renderUserList();
    });

    // ---- Добавление сообщения в DOM с временем ----
    function addMessageToChat(senderName, text, isOwn, time) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isOwn ? 'own' : 'other'}`;
      
      if (!isOwn) {
        const nameSpan = document.createElement('div');
        nameSpan.className = 'sender';
        nameSpan.textContent = senderName;
        messageDiv.appendChild(nameSpan);
      }
      
      const textSpan = document.createElement('div');
      textSpan.textContent = text;
      messageDiv.appendChild(textSpan);
      
      const timeSpan = document.createElement('div');
      timeSpan.className = 'time';
      timeSpan.textContent = time;
      messageDiv.appendChild(timeSpan);
      
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // ---- Звук ----
    function playNotificationSound() {
      if (!audioContext) return;
      if (audioContext.state === 'suspended') {
        audioContext.resume().then(() => beep());
      } else {
        beep();
      }
    }

    function beep() {
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      oscillator.frequency.value = 800;
      gainNode.gain.value = 0.2;
      oscillator.start();
      oscillator.stop(audioContext.currentTime + 0.1);
    }

    // ---- Обработка изменения размера окна (для мобильной навигации) ----
    window.addEventListener('resize', () => {
      if (window.innerWidth > 768) {
        // На десктопе всегда показываем обе панели
        chatMain.classList.remove('active');
        // Если есть выбранный пользователь, оставляем как есть (обе панели видны)
      } else {
        // На мобильных: если есть выбранный пользователь, показываем чат, иначе скрываем
        if (selectedUser) {
          chatMain.classList.add('active');
        } else {
          chatMain.classList.remove('active');
        }
      }
    });
  </script>
</body>
</html>
