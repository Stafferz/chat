<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Чёрно-оранжевый мессенджер</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #121212; /* тёмный фон */
      overflow-x: hidden;
    }

    /* Экран входа */
    #login {
      background: #1e1e1e;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      width: 90%;
      max-width: 400px;
      text-align: center;
      border: 1px solid #ff8c00;
    }

    #login h2 {
      margin-bottom: 1.5rem;
      color: #ff8c00;
    }

    #login input {
      width: 100%;
      padding: 1rem;
      margin: 1rem 0;
      border: 1px solid #333;
      border-radius: 30px;
      font-size: 1rem;
      outline: none;
      background: #2a2a2a;
      color: #fff;
      transition: border 0.2s;
    }

    #login input:focus {
      border-color: #ff8c00;
    }

    #login button {
      padding: 1rem 2rem;
      background: #ff8c00;
      color: #121212;
      border: none;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }

    #login button:active {
      background: #e07b00;
    }

    #error {
      color: #ff4444;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    /* Основной интерфейс чата */
    #chat {
      display: none;
      width: 100%;
      height: 100%;
      background: #121212;
      overflow-x: hidden;
    }

    .chat-container {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
      overflow-x: hidden;
    }

    .sidebar {
      width: 300px;
      background: #1e1e1e;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }

    .sidebar h3 {
      padding: 1.2rem 1rem;
      background: #ff8c00;
      color: #121212;
      margin: 0;
      font-size: 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #change-nick-btn {
      background: transparent;
      border: 1px solid #121212;
      color: #121212;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: normal;
    }

    #change-nick-btn:active {
      background: rgba(0,0,0,0.1);
    }

    #user-list {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #user-list li {
      padding: 1rem;
      border-bottom: 1px solid #333;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.1rem;
      color: #fff;
      transition: background 0.2s;
    }

    #user-list li:active {
      background: #2a2a2a;
    }

    #user-list li.selected {
      background: #ff8c00;
      color: #121212;
    }

    .notification-badge {
      background: #ff8c00;
      color: #121212;
      border-radius: 50%;
      min-width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: bold;
      padding: 0 4px;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #121212;
    }

    #chat-header {
      padding: 1rem;
      background: #1e1e1e;
      border-bottom: 1px solid #333;
      font-weight: bold;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #ff8c00;
    }

    #back-btn {
      background: transparent;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.5rem 1rem;
      display: none;
      color: #ff8c00;
      font-weight: bold;
    }

    #back-btn:active {
      opacity: 0.6;
    }

    #messages {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      max-width: 80%;
      margin-bottom: 0.25rem;
      padding: 0.75rem 1rem;
      border-radius: 20px;
      word-wrap: break-word;
      font-size: 1rem;
      line-height: 1.4;
    }

    .message.own {
      align-self: flex-end;
      background: #ff8c00;
      color: #121212;
      border-bottom-right-radius: 4px;
    }

    .message.other {
      align-self: flex-start;
      background: #2a2a2a;
      color: #fff;
      border-bottom-left-radius: 4px;
    }

    .message .sender {
      font-size: 0.85rem;
      font-weight: bold;
      margin-bottom: 0.25rem;
      color: #ff8c00;
    }

    .message .time {
      font-size: 0.7rem;
      margin-top: 4px;
      opacity: 0.7;
      text-align: right;
    }
    .message.own .time {
      color: #121212;
    }
    .message.other .time {
      color: #aaa;
    }

    .input-area {
      display: flex;
      padding: 0.75rem;
      border-top: 1px solid #333;
      background: #1e1e1e;
      gap: 8px;
      align-items: center;
    }

    #message-input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid #333;
      border-radius: 30px;
      font-size: 1rem;
      outline: none;
      min-width: 0;
      background: #2a2a2a;
      color: #fff;
    }

    #message-input:focus {
      border-color: #ff8c00;
    }

    #send-btn {
      padding: 0.75rem 1.5rem;
      background: #ff8c00;
      color: #121212;
      border: none;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      min-width: 80px;
      white-space: nowrap;
    }

    #send-btn:active {
      background: #e07b00;
    }

    #send-btn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    /* Мобильные стили */
    @media (max-width: 768px) {
      body, #chat, .chat-container {
        overflow-x: hidden;
      }

      .chat-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 100%;
        border-right: none;
      }

      .main {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        background: #121212;
        transform: translateX(100%);
        transition: transform 0.3s ease;
        z-index: 10;
      }

      .main.active {
        transform: translateX(0);
      }

      #back-btn {
        display: inline-block;
      }

      #user-list li {
        padding: 1.2rem 1rem;
        font-size: 1.2rem;
      }

      .notification-badge {
        min-width: 28px;
        height: 28px;
        font-size: 1rem;
      }

      #send-btn {
        padding: 0.7rem 1.2rem;
        font-size: 1rem;
        min-width: 70px;
      }

      #message-input {
        padding: 0.7rem 1rem;
        font-size: 1rem;
      }

      #chat-header {
        padding: 1.2rem;
        font-size: 1.3rem;
      }

      #back-btn {
        font-size: 1.8rem;
        padding: 0.5rem 1rem 0.5rem 0.5rem;
      }
    }

    @media (max-width: 480px) {
      .message {
        max-width: 90%;
        font-size: 1rem;
      }

      #login {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div id="login">
    <h2>Вход в чат</h2>
    <input type="text" id="name-input" placeholder="Ваше имя" autofocus>
    <button id="join-btn">Присоединиться</button>
    <div id="error"></div>
  </div>

  <div id="chat">
    <div class="chat-container">
      <div class="sidebar">
        <h3>
          Участники онлайн
          <button id="change-nick-btn">Сменить ник</button>
        </h3>
        <ul id="user-list"></ul>
      </div>
      <div class="main" id="chat-main">
        <div id="chat-header">
          <button id="back-btn">←</button>
          <span id="chat-title">Выберите собеседника</span>
        </div>
        <div id="messages"></div>
        <div class="input-area">
          <input type="text" id="message-input" placeholder="Сообщение" disabled>
          <button id="send-btn" disabled>Отправить</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    // Элементы DOM
    const loginDiv = document.getElementById('login');
    const chatDiv = document.getElementById('chat');
    const nameInput = document.getElementById('name-input');
    const joinBtn = document.getElementById('join-btn');
    const errorDiv = document.getElementById('error');
    const userListEl = document.getElementById('user-list');
    const chatMain = document.getElementById('chat-main');
    const chatTitle = document.getElementById('chat-title');
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const backBtn = document.getElementById('back-btn');
    const changeNickBtn = document.getElementById('change-nick-btn');

    // Состояние
    let currentUser = null;          // { id, name }
    let selectedUser = null;         // { id, name }
    let users = [];                  // онлайн пользователи
    let chatHistory = {};             // peerId -> массив сообщений
    let audioContext = null;

    // ---- Загрузка сохранённых данных из localStorage ----
    function loadFromStorage() {
      const savedName = localStorage.getItem('userName');
      const savedId = localStorage.getItem('userId');
      const savedHistory = localStorage.getItem('chatHistory');
      if (savedName && savedId) {
        // Сохраняем в currentUser, но не пытаемся войти автоматически
        // Подключение произойдёт после загрузки страницы, но нужно отправить событие join с этими данными
        currentUser = { id: savedId, name: savedName };
        nameInput.value = savedName;
        if (savedHistory) {
          try {
            chatHistory = JSON.parse(savedHistory);
          } catch (e) {}
        }
        // Попытка подключиться
        socket.emit('join', { name: savedName, userId: savedId });
        // Показываем интерфейс чата (он будет скрыт, если ошибка)
        loginDiv.style.display = 'none';
        chatDiv.style.display = 'flex';
      }
    }

    // ---- Сохранение в localStorage ----
    function saveToStorage() {
      if (currentUser) {
        localStorage.setItem('userName', currentUser.name);
        localStorage.setItem('userId', currentUser.id);
        localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
      }
    }

    // ---- Очистка storage и возврат к логину ----
    function logout() {
      localStorage.removeItem('userName');
      localStorage.removeItem('userId');
      localStorage.removeItem('chatHistory');
      currentUser = null;
      selectedUser = null;
      chatHistory = {};
      // Отключаем сокет и показываем экран входа
      socket.disconnect();
      socket.connect(); // переподключаемся для нового входа
      loginDiv.style.display = 'block';
      chatDiv.style.display = 'none';
      errorDiv.textContent = '';
    }

    // ---- Смена ника ----
    changeNickBtn.addEventListener('click', () => {
      logout();
    });

    // ---- Вход (кнопка) ----
    joinBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if (!name) return;
      // Отправляем join без userId (новый пользователь)
      socket.emit('join', { name });
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
    });

    nameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') joinBtn.click();
    });

    // ---- Ошибка входа (например, имя занято, но у нас теперь имя может дублироваться) ----
    socket.on('joinError', (msg) => {
      errorDiv.textContent = msg;
      // Если была попытка автоматического входа, очищаем
      if (currentUser) {
        logout();
      }
    });

    // ---- Успешный вход ----
    socket.on('joined', (user) => {
      currentUser = user;
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      saveToStorage();
      loginDiv.style.display = 'none';
      chatDiv.style.display = 'flex';
    });

    // ---- Вытеснение (другое подключение с тем же ID) ----
    socket.on('kicked', (msg) => {
      alert(msg); // или показать уведомление
      logout();
    });

    // ---- Обновление списка пользователей ----
    socket.on('user list', (onlineUsers) => {
      // Фильтруем текущего пользователя
      users = onlineUsers.filter(u => u.id !== currentUser?.id);
      renderUserList();

      if (selectedUser && !users.find(u => u.id === selectedUser.id)) {
        closeChat();
      }
    });

    function renderUserList() {
      userListEl.innerHTML = '';
      users.forEach(user => {
        const li = document.createElement('li');
        li.dataset.id = user.id;
        
        const nameSpan = document.createElement('span');
        nameSpan.textContent = user.name;
        li.appendChild(nameSpan);

        const history = chatHistory[user.id] || [];
        const unreadCount = history.filter(msg => !msg.isOwn && !msg.read).length;
        if (unreadCount > 0) {
          const badge = document.createElement('span');
          badge.className = 'notification-badge';
          badge.textContent = unreadCount;
          li.appendChild(badge);
        }

        if (selectedUser && selectedUser.id === user.id) {
          li.classList.add('selected');
        }

        li.addEventListener('click', () => selectUser(user));
        userListEl.appendChild(li);
      });
    }

    function selectUser(user) {
      selectedUser = user;
      chatTitle.textContent = `Чат с ${user.name}`;
      messageInput.disabled = false;
      sendBtn.disabled = false;
      messageInput.focus();

      if (chatHistory[user.id]) {
        chatHistory[user.id].forEach(msg => { msg.read = true; });
      }

      renderUserList();
      loadChatHistory(user.id);
      saveToStorage();

      if (window.innerWidth <= 768) {
        chatMain.classList.add('active');
      }
    }

    function loadChatHistory(peerId) {
      messagesDiv.innerHTML = '';
      const history = chatHistory[peerId] || [];
      history.forEach(msg => {
        addMessageToChat(msg.fromName, msg.text, msg.isOwn, msg.time);
      });
    }

    function closeChat() {
      selectedUser = null;
      chatTitle.textContent = 'Выберите собеседника';
      messageInput.disabled = true;
      sendBtn.disabled = true;
      messagesDiv.innerHTML = '';
      renderUserList();
      userListEl.scrollTop = 0;

      if (window.innerWidth <= 768) {
        chatMain.classList.remove('active');
      }
    }

    backBtn.addEventListener('click', closeChat);

    // ---- Отправка сообщения ----
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !selectedUser) return;

      socket.emit('private message', {
        to: selectedUser.id,
        text,
      });

      messageInput.value = '';
    }

    // ---- Получение сообщения ----
    socket.on('private message', ({ from, fromName, to, text }) => {
      const isOwn = from === currentUser.id;
      const peerId = isOwn ? to : from;
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      if (!chatHistory[peerId]) chatHistory[peerId] = [];
      const message = { fromName, text, isOwn, read: isOwn, time };
      chatHistory[peerId].push(message);
      saveToStorage();

      const isActiveChat = selectedUser && selectedUser.id === peerId;

      if (!isOwn) {
        if (isActiveChat) {
          playActiveChatSound();
        } else {
          playNotificationSound();
        }
      }

      if (isActiveChat) {
        addMessageToChat(fromName, text, isOwn, time);
        if (!isOwn) message.read = true;
      }

      renderUserList();
    });

    function addMessageToChat(senderName, text, isOwn, time) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isOwn ? 'own' : 'other'}`;
      
      if (!isOwn) {
        const nameSpan = document.createElement('div');
        nameSpan.className = 'sender';
        nameSpan.textContent = senderName;
        messageDiv.appendChild(nameSpan);
      }
      
      const textSpan = document.createElement('div');
      textSpan.textContent = text;
      messageDiv.appendChild(textSpan);
      
      const timeSpan = document.createElement('div');
      timeSpan.className = 'time';
      timeSpan.textContent = time;
      messageDiv.appendChild(timeSpan);
      
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // ---- Звуки ----
    function playNotificationSound() {
      playBeep(800, 0.2, 0.1);
    }

    function playActiveChatSound() {
      playBeep(600, 0.1, 0.05);
    }

    function playBeep(freq, gainValue, duration) {
      if (!audioContext) return;
      if (audioContext.state === 'suspended') {
        audioContext.resume().then(() => {
          beep(audioContext, freq, gainValue, duration);
        });
      } else {
        beep(audioContext, freq, gainValue, duration);
      }
    }

    function beep(ctx, freq, gainValue, duration) {
      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);
      oscillator.frequency.value = freq;
      gainNode.gain.value = gainValue;
      oscillator.start();
      oscillator.stop(ctx.currentTime + duration);
    }

    // ---- При загрузке страницы пытаемся восстановить сессию ----
    window.addEventListener('load', () => {
      loadFromStorage();
    });

    // ---- Обработка изменения размера окна ----
    window.addEventListener('resize', () => {
      if (window.innerWidth > 768) {
        chatMain.classList.remove('active');
      } else {
        if (selectedUser) {
          chatMain.classList.add('active');
        } else {
          chatMain.classList.remove('active');
        }
      }
    });
  </script>
</body>
</html>
