<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Оранжевый чат</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #121212;
      overflow-x: hidden;
    }

    #login {
      background: #1e1e1e;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      width: 90%;
      max-width: 400px;
      text-align: center;
      color: #fff;
    }

    #login h2 {
      margin-bottom: 1.5rem;
      color: #ff8c00;
    }

    #login input {
      width: 100%;
      padding: 1rem;
      margin: 1rem 0;
      border: 1px solid #444;
      border-radius: 30px;
      font-size: 1rem;
      outline: none;
      background: #2a2a2a;
      color: #fff;
      transition: border 0.2s;
    }

    #login input:focus {
      border-color: #ff8c00;
    }

    #login button {
      padding: 1rem 2rem;
      background: #ff8c00;
      color: #121212;
      border: none;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }

    #login button:active {
      background: #e07b00;
    }

    #error {
      color: #ff6b6b;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    #chat {
      display: none;
      width: 100%;
      height: 100%;
      background: #121212;
      overflow-x: hidden;
    }

    .chat-container {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
      overflow-x: hidden;
    }

    .sidebar {
      width: 300px;
      background: #1e1e1e;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      padding: 1rem;
      background: #ff8c00;
      color: #121212;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
    }

    #change-nick-btn {
      background: transparent;
      border: 1px solid #121212;
      color: #121212;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
    }

    #change-nick-btn:active {
      background: rgba(0,0,0,0.1);
    }

    #chat-list {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #chat-list li {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 1.1rem;
      color: #fff;
      transition: background 0.2s;
      position: relative;
    }

    #chat-list li:active {
      background: #2a2a2a;
    }

    #chat-list li.selected {
      background: #b85e00;
      color: #121212;
      box-shadow: inset 0 0 0 1px rgba(255,140,0,0.5);
    }

    .chat-item {
      display: flex;
      align-items: center;
      flex: 1;
      min-width: 0;
      gap: 5px;
    }

    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 5px;
      flex-shrink: 0;
    }
    .status-online {
      background: #4caf50;
      box-shadow: 0 0 5px #4caf50;
    }
    .status-offline {
      background: #888;
    }

    .chat-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .chat-last-seen {
      font-size: 0.7rem;
      color: #aaa;
      margin-left: 5px;
    }

    .typing-indicator-chat {
      font-size: 0.8rem;
      color: #ff8c00;
      margin-left: 5px;
      font-style: italic;
    }

    .notification-badge {
      background: #ff8c00;
      color: #121212;
      border-radius: 50%;
      min-width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: bold;
      padding: 0 4px;
      margin-left: 8px;
    }

    .delete-chat-btn {
      background: transparent;
      border: none;
      color: #ff8c00;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 5px;
      margin-left: 5px;
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    .delete-chat-btn:hover {
      opacity: 1;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #121212;
      position: relative;
    }

    #chat-header {
      padding: 0.8rem 1rem;
      background: #1e1e1e;
      border-bottom: 1px solid #333;
      font-weight: bold;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #ff8c00;
      flex-wrap: wrap;
      z-index: 5;
    }

    #back-btn {
      background: transparent;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.5rem 1rem 0.5rem 0.5rem;
      display: none;
      color: #ff8c00;
      font-weight: bold;
    }

    #back-btn:active {
      opacity: 0.6;
    }

    #chat-title {
      flex: 1;
    }

    #clear-chat-btn {
      background: transparent;
      border: 1px solid #ff8c00;
      color: #ff8c00;
      padding: 0.2rem 0.6rem;
      border-radius: 16px;
      cursor: pointer;
      font-size: 0.8rem;
      margin-left: auto;
    }

    #typing-indicator-header {
      font-size: 0.9rem;
      color: #ff8c00;
      margin-left: 10px;
      font-style: italic;
    }

    #messages {
      flex: 1;
      padding: 0.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    .date-separator {
      text-align: center;
      font-size: 0.8rem;
      color: #aaa;
      margin: 0.5rem 0;
      position: relative;
    }
    .date-separator span {
      background: #1e1e1e;
      padding: 0.2rem 1rem;
      border-radius: 20px;
    }

    .message {
      max-width: 75%;
      margin-bottom: 0.15rem;
      padding: 0.5rem 0.8rem;
      border-radius: 18px;
      word-wrap: break-word;
      overflow-wrap: break-word;
      word-break: break-word;
      font-size: 0.95rem;
      line-height: 1.3;
      position: relative;
    }

    .message.own {
      align-self: flex-end;
      background: #ff8c00;
      color: #121212;
      border-bottom-right-radius: 4px;
    }

    .message.other {
      align-self: flex-start;
      background: #2a2a2a;
      color: #fff;
      border-bottom-left-radius: 4px;
    }

    .message .sender {
      font-size: 0.8rem;
      font-weight: bold;
      margin-bottom: 0.2rem;
      color: #aaa;
    }

    .message .time {
      font-size: 0.65rem;
      margin-top: 2px;
      opacity: 0.7;
      text-align: right;
    }
    .message.own .time {
      color: #121212;
    }
    .message.other .time {
      color: #aaa;
    }

    .message .reply-context {
      background: rgba(0,0,0,0.1);
      border-left: 3px solid #ff8c00;
      padding: 0.3rem 0.5rem;
      margin-bottom: 0.3rem;
      font-size: 0.85rem;
      border-radius: 8px;
      color: #ddd;
    }
    .message.own .reply-context {
      background: rgba(0,0,0,0.2);
      color: #222;
    }

    .message .edited-label {
      font-size: 0.7rem;
      opacity: 0.7;
      margin-left: 5px;
      font-style: italic;
    }

    .message-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .message:hover .message-actions,
    .message:active .message-actions {
      opacity: 1;
    }
    .message-actions button {
      background: transparent;
      border: none;
      color: inherit;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 2px 5px;
    }

    .message img, .message video {
      max-width: 100%;
      max-height: 200px;
      border-radius: 8px;
      cursor: pointer;
      display: block;
      margin-top: 4px;
    }

    .file-attachment {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,140,0,0.2);
      padding: 0.5rem;
      border-radius: 12px;
      margin-top: 4px;
      text-decoration: none;
      color: inherit;
    }
    .file-attachment span {
      font-size: 0.9rem;
      word-break: break-word;
    }

    .input-area {
      display: flex;
      padding: 0.5rem;
      border-top: 1px solid #333;
      background: #1e1e1e;
      gap: 8px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .reply-preview {
      width: 100%;
      background: #2a2a2a;
      border-left: 4px solid #ff8c00;
      padding: 0.4rem 0.8rem;
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #fff;
      border-radius: 8px;
    }
    .reply-preview button {
      background: none;
      border: none;
      color: #ff8c00;
      font-size: 1.2rem;
      cursor: pointer;
    }

    #message-input {
      flex: 1 1 200px;
      padding: 0.6rem 1rem;
      border: 1px solid #444;
      border-radius: 24px;
      font-size: 1rem;
      outline: none;
      min-width: 0;
      background: #2a2a2a;
      color: #fff;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.4;
    }

    #message-input:focus {
      border-color: #ff8c00;
    }

    #send-btn {
      padding: 0.6rem 1.2rem;
      background: #ff8c00;
      color: #121212;
      border: none;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      min-width: 80px;
      white-space: nowrap;
      align-self: center;
    }

    #send-btn:active {
      background: #e07b00;
    }

    #send-btn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    #file-upload {
      display: none;
    }

    .file-upload-label {
      background: #ff8c00;
      color: #121212;
      padding: 0.5rem 1rem;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
      flex-shrink: 0;
      align-self: center;
    }

    .file-preview {
      width: 100%;
      background: #2a2a2a;
      border-radius: 12px;
      padding: 0.3rem 0.8rem;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      font-size: 0.9rem;
    }
    .file-preview span {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-preview button {
      background: none;
      border: none;
      color: #ff8c00;
      font-size: 1rem;
      cursor: pointer;
    }

    #scroll-down-btn {
      position: absolute;
      bottom: 80px;
      right: 20px;
      background: #ff8c00;
      color: #121212;
      border: none;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      font-size: 1.8rem;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    #scroll-down-btn:hover {
      background: #e07b00;
    }

    /* Мобильные стили */
    @media (max-width: 768px) {
      .sidebar { width: 100%; height: 100%; border-right: none; }
      .main {
        width: 100%; height: 100%;
        position: absolute; top: 0; left: 0;
        background: #121212;
        transform: translateX(100%);
        transition: transform 0.3s ease;
        z-index: 10;
      }
      .main.active { transform: translateX(0); }
      #back-btn { display: inline-block; }
      #chat-list li { padding: 1rem; font-size: 1.2rem; }
      .notification-badge { min-width: 28px; height: 28px; font-size: 1rem; }

      .input-area {
        flex-wrap: wrap;
      }
      #message-input {
        flex: 1 1 100%;
        order: 1;
      }
      .file-upload-label {
        order: 2;
      }
      #send-btn {
        order: 3;
      }
      .file-preview {
        order: 0;
      }
      .reply-preview {
        order: 0;
      }
    }
  </style>
</head>
<body>
  <div id="login">
    <h2>Оранжевый чат</h2>
    <input type="text" id="name-input" placeholder="Ваше имя" autofocus>
    <button id="join-btn">Войти</button>
    <div id="error"></div>
  </div>

  <div id="chat">
    <div class="chat-container">
      <div class="sidebar">
        <div class="sidebar-header">
          <span>Чаты</span>
          <button id="change-nick-btn">Сменить ник</button>
        </div>
        <ul id="chat-list"></ul>
      </div>
      <div class="main" id="chat-main">
        <div id="chat-header">
          <button id="back-btn">←</button>
          <span id="chat-title">Выберите собеседника</span>
          <span id="typing-indicator-header"></span>
          <button id="clear-chat-btn" style="display: none;">Очистить</button>
        </div>
        <div id="messages"></div>
        <button id="scroll-down-btn">⬇️</button>
        <div class="input-area">
          <div id="reply-preview" class="reply-preview" style="display: none;">
            <span id="reply-text"></span>
            <button id="cancel-reply-btn">✖</button>
          </div>
          <div id="file-preview" class="file-preview" style="display: none;">
            <span id="file-name"></span>
            <button id="cancel-file-btn">✖</button>
          </div>
          <textarea id="message-input" placeholder="Сообщение" rows="1" disabled></textarea>
          <label for="file-upload" class="file-upload-label" id="upload-label">📎</label>
          <input type="file" id="file-upload" accept="image/*,video/*,application/pdf,text/plain,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/zip">
          <button id="send-btn" disabled>Отправить</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    function generateClientId() {
      return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    }

    // Конвертация base64 в Uint8Array для VAPID ключа
    function urlB64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
      const rawData = window.atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; ++i) {
        outputArray[i] = rawData.charCodeAt(i);
      }
      return outputArray;
    }

    // Элементы DOM
    const loginDiv = document.getElementById('login');
    const chatDiv = document.getElementById('chat');
    const nameInput = document.getElementById('name-input');
    const joinBtn = document.getElementById('join-btn');
    const errorDiv = document.getElementById('error');
    const chatListEl = document.getElementById('chat-list');
    const chatMain = document.getElementById('chat-main');
    const chatTitle = document.getElementById('chat-title');
    const typingIndicatorHeader = document.getElementById('typing-indicator-header');
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const backBtn = document.getElementById('back-btn');
    const changeNickBtn = document.getElementById('change-nick-btn');
    const clearChatBtn = document.getElementById('clear-chat-btn');
    const fileUpload = document.getElementById('file-upload');
    const uploadLabel = document.getElementById('upload-label');
    const scrollDownBtn = document.getElementById('scroll-down-btn');
    const replyPreview = document.getElementById('reply-preview');
    const replyTextSpan = document.getElementById('reply-text');
    const cancelReplyBtn = document.getElementById('cancel-reply-btn');
    const filePreview = document.getElementById('file-preview');
    const fileNameSpan = document.getElementById('file-name');
    const cancelFileBtn = document.getElementById('cancel-file-btn');

    // Состояние
    let currentUser = null;
    let selectedUser = null;
    let onlineUsers = []; // {id, name}
    let lastSeenMap = {}; // id -> timestamp
    let chatHistory = {}; // peerId -> { messages: [], peerName, isTyping }
    let audioContext = null;
    let typingTimer = null;
    let pushSubscriptionAttempted = false;
    let replyToMessage = null; // { id, text, fromName }
    let selectedFile = null;
    let isEditing = false;
    let editingMessageId = null;

    // Загрузка из localStorage
    function loadFromStorage() {
      const savedName = localStorage.getItem('userName');
      const savedId = localStorage.getItem('userId');
      if (savedName && savedId) {
        currentUser = { id: savedId, name: savedName };
        nameInput.value = savedName;
        const savedHistory = localStorage.getItem('chatHistory');
        if (savedHistory) {
          try {
            chatHistory = JSON.parse(savedHistory);
            for (let peerId in chatHistory) {
              if (chatHistory[peerId].isTyping === undefined) chatHistory[peerId].isTyping = false;
            }
          } catch (e) { console.warn('Ошибка парсинга истории', e); }
        }
        loginDiv.style.display = 'none';
        chatDiv.style.display = 'flex';
        socket.emit('join', { name: savedName, userId: savedId });
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function saveToStorage() {
      if (currentUser) {
        localStorage.setItem('userName', currentUser.name);
        localStorage.setItem('userId', currentUser.id);
        localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
      }
    }

    function clearStorageAndRelogin() {
      localStorage.removeItem('userName');
      localStorage.removeItem('userId');
      localStorage.removeItem('chatHistory');
      currentUser = null;
      selectedUser = null;
      chatHistory = {};
      location.reload();
    }

    joinBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if (!name) return;
      let userId = localStorage.getItem('userId');
      if (!userId) {
        userId = generateClientId();
        localStorage.setItem('userId', userId);
      }
      socket.emit('join', { name, userId });
      if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
    });

    nameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') joinBtn.click(); });
    changeNickBtn.addEventListener('click', clearStorageAndRelogin);

    socket.on('joinError', (msg) => {
      errorDiv.textContent = msg;
      if (currentUser) clearStorageAndRelogin();
    });

    socket.on('joined', (user) => {
      currentUser = user;
      localStorage.setItem('userName', user.name);
      localStorage.setItem('userId', user.id);
      if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
      loginDiv.style.display = 'none';
      chatDiv.style.display = 'flex';
      subscribeToPush();
      // Добавляем состояние истории для навигации
      history.replaceState({ screen: 'chatlist' }, '');
    });

    socket.on('kicked', (data) => {
      if (data.userId === currentUser?.id) { alert(data.message); location.reload(); }
    });

    // Подписка на push (без изменений)
    async function subscribeToPush() {
      // ... (код тот же, что и раньше, опустим для краткости, но он должен остаться)
    }

    // Обновление списка онлайн
    socket.on('user list', (online) => {
      onlineUsers = online;
      buildChatList();
    });

    socket.on('last seen update', (lastSeen) => {
      lastSeenMap = lastSeen;
      buildChatList(); // обновим отображение last seen
    });

    function buildChatList() {
      const allChats = [];
      onlineUsers.filter(u => u.id !== currentUser?.id).forEach(u => allChats.push({ id: u.id, name: u.name, online: true }));
      Object.keys(chatHistory).forEach(peerId => {
        if (peerId !== currentUser?.id && !onlineUsers.some(u => u.id === peerId)) {
          const peerName = chatHistory[peerId].peerName || 'Неизвестно';
          allChats.push({ id: peerId, name: peerName, online: false });
        }
      });
      const unique = Array.from(new Map(allChats.map(item => [item.id, item])).values());
      renderChatList(unique);
    }

    function renderChatList(chats) {
      chatListEl.innerHTML = '';
      chats.forEach(chat => {
        const li = document.createElement('li');
        li.dataset.id = chat.id;

        const chatItemDiv = document.createElement('div');
        chatItemDiv.className = 'chat-item';
        const statusSpan = document.createElement('span');
        statusSpan.className = `status-indicator ${chat.online ? 'status-online' : 'status-offline'}`;
        const nameSpan = document.createElement('span');
        nameSpan.className = 'chat-name';
        nameSpan.textContent = chat.name;
        chatItemDiv.appendChild(statusSpan);
        chatItemDiv.appendChild(nameSpan);
        if (!chat.online && lastSeenMap[chat.id]) {
          const lastSeenSpan = document.createElement('span');
          lastSeenSpan.className = 'chat-last-seen';
          lastSeenSpan.textContent = formatLastSeen(lastSeenMap[chat.id]);
          chatItemDiv.appendChild(lastSeenSpan);
        }
        if (chat.online && chatHistory[chat.id]?.isTyping) {
          const typingSpan = document.createElement('span');
          typingSpan.className = 'typing-indicator-chat';
          typingSpan.textContent = '✏️';
          chatItemDiv.appendChild(typingSpan);
        }
        li.appendChild(chatItemDiv);

        const history = chatHistory[chat.id]?.messages || [];
        const unreadCount = history.filter(msg => !msg.isOwn && !msg.read).length;
        if (unreadCount > 0) {
          const badge = document.createElement('span');
          badge.className = 'notification-badge';
          badge.textContent = unreadCount;
          li.appendChild(badge);
        }

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-chat-btn';
        deleteBtn.textContent = '❌';
        deleteBtn.title = 'Удалить чат';
        deleteBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteChat(chat.id); });
        li.appendChild(deleteBtn);

        if (selectedUser && selectedUser.id === chat.id) li.classList.add('selected');
        li.addEventListener('click', () => selectUser(chat));
        chatListEl.appendChild(li);
      });
    }

    function formatLastSeen(timestamp) {
      const diff = Date.now() - timestamp;
      if (diff < 60000) return 'только что';
      if (diff < 3600000) return `${Math.floor(diff/60000)} мин. назад`;
      if (diff < 86400000) return `${Math.floor(diff/3600000)} ч. назад`;
      return new Date(timestamp).toLocaleDateString();
    }

    function deleteChat(peerId) {
      if (!confirm('Удалить историю переписки с этим пользователем? Это действие необратимо.')) return;
      delete chatHistory[peerId];
      saveToStorage();
      if (selectedUser && selectedUser.id === peerId) closeChat();
      buildChatList();
    }

    function selectUser(chat) {
      selectedUser = chat;
      chatTitle.textContent = `Чат с ${chat.name}`;
      if (!chat.online) {
        const last = lastSeenMap[chat.id];
        chatTitle.textContent += last ? ` (был(а) ${formatLastSeen(last)})` : ' (офлайн)';
      }
      typingIndicatorHeader.textContent = '';

      messageInput.disabled = false;
      sendBtn.disabled = false;

      if (!chatHistory[chat.id]) {
        chatHistory[chat.id] = { messages: [], peerName: chat.name, isTyping: false };
      } else {
        chatHistory[chat.id].peerName = chat.name;
      }

      clearChatBtn.style.display = 'inline-block';
      messageInput.focus();

      if (chatHistory[chat.id]) {
        chatHistory[chat.id].messages.forEach(msg => { msg.read = true; });
      }

      buildChatList();
      loadChatHistory(chat.id);
      saveToStorage();

      if (window.innerWidth <= 768) {
        chatMain.classList.add('active');
        history.pushState({ screen: 'chat', peerId: chat.id }, '', `#chat/${chat.id}`);
      }
    }

    function loadChatHistory(peerId) {
      messagesDiv.innerHTML = '';
      const history = chatHistory[peerId]?.messages || [];
      // Группировка по датам
      let lastDate = null;
      history.forEach(msg => {
        const msgDate = new Date(msg.timestamp).toDateString();
        if (msgDate !== lastDate) {
          lastDate = msgDate;
          const separator = document.createElement('div');
          separator.className = 'date-separator';
          const span = document.createElement('span');
          const today = new Date().toDateString();
          const yesterday = new Date(Date.now() - 86400000).toDateString();
          if (msgDate === today) span.textContent = 'Сегодня';
          else if (msgDate === yesterday) span.textContent = 'Вчера';
          else span.textContent = new Date(msg.timestamp).toLocaleDateString();
          separator.appendChild(span);
          messagesDiv.appendChild(separator);
        }
        displayMessage(msg);
      });
      checkScroll();
    }

    function closeChat() {
      selectedUser = null;
      chatTitle.textContent = 'Выберите собеседника';
      typingIndicatorHeader.textContent = '';
      messageInput.disabled = true;
      sendBtn.disabled = true;
      clearChatBtn.style.display = 'none';
      messagesDiv.innerHTML = '';
      replyToMessage = null;
      replyPreview.style.display = 'none';
      cancelFile();
      buildChatList();
      chatListEl.scrollTop = 0;
      if (window.innerWidth <= 768) {
        chatMain.classList.remove('active');
        history.pushState({ screen: 'chatlist' }, '', '#');
      }
    }

    // Обработка кнопки назад на Android
    window.addEventListener('popstate', (event) => {
      if (event.state && event.state.screen === 'chatlist') {
        if (selectedUser) closeChat();
      } else if (!event.state || event.state.screen === 'chat') {
        // остаёмся в чате, если он открыт
      } else {
        // если ничего нет, возможно выход
      }
    });

    backBtn.addEventListener('click', closeChat);

    clearChatBtn.addEventListener('click', () => {
      if (!selectedUser) return;
      if (confirm('Очистить всю историю сообщений с этим пользователем?')) {
        socket.emit('clear chat', { peerId: selectedUser.id });
      }
    });

    // Отправка сообщения
    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text && !selectedFile && !isEditing) return;

      if (isEditing) {
        // Режим редактирования
        socket.emit('edit message', {
          messageId: editingMessageId,
          newText: text,
          peerId: selectedUser.id
        });
        isEditing = false;
        editingMessageId = null;
        messageInput.value = '';
        messageInput.style.height = 'auto';
        return;
      }

      if (selectedFile) {
        // Отправка файла
        const formData = new FormData();
        formData.append('file', selectedFile);

        const originalText = sendBtn.textContent;
        sendBtn.textContent = '0%';
        sendBtn.disabled = true;

        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/upload', true);
        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100);
            sendBtn.textContent = percent + '%';
          }
        };
        xhr.onload = () => {
          if (xhr.status === 200) {
            const data = JSON.parse(xhr.responseText);
            const fileInfo = {
              url: data.url,
              mimetype: data.mimetype,
              originalname: data.originalname
            };
            socket.emit('private message', {
              to: selectedUser.id,
              text: text,
              fileInfo: fileInfo,
              replyTo: replyToMessage ? replyToMessage.id : null
            });
            playSelfSendSound();
            // Очищаем поля
            messageInput.value = '';
            messageInput.style.height = 'auto';
            cancelReply();
            cancelFile();
          } else {
            alert('Ошибка загрузки');
          }
          sendBtn.textContent = originalText;
          sendBtn.disabled = false;
          messageInput.focus(); // чтобы клавиатура не закрывалась на телефоне
        };
        xhr.onerror = () => {
          alert('Ошибка сети');
          sendBtn.textContent = originalText;
          sendBtn.disabled = false;
        };
        xhr.send(formData);
      } else {
        // Текстовое сообщение
        socket.emit('private message', {
          to: selectedUser.id,
          text: text,
          replyTo: replyToMessage ? replyToMessage.id : null
        });
        playSelfSendSound();
        messageInput.value = '';
        messageInput.style.height = 'auto';
        cancelReply();
        messageInput.focus(); // для мобильных
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    // Обработка Enter и Shift+Enter в textarea
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Автоизменение высоты textarea
    messageInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
      // Индикатор печати
      if (!selectedUser || !selectedUser.online) return;
      socket.emit('typing', { to: selectedUser.id });
      if (typingTimer) clearTimeout(typingTimer);
      typingTimer = setTimeout(() => { socket.emit('stop typing', { to: selectedUser.id }); }, 2000);
    });

    // Редактирование сообщения (вызывается из кнопки)
    function startEdit(messageId, currentText) {
      isEditing = true;
      editingMessageId = messageId;
      messageInput.value = currentText;
      messageInput.style.height = 'auto';
      messageInput.style.height = messageInput.scrollHeight + 'px';
      messageInput.focus();
    }

    // Удаление сообщения
    function deleteMessage(messageId) {
      if (!confirm('Удалить сообщение?')) return;
      socket.emit('delete message', { messageId, peerId: selectedUser.id });
    }

    // Ответ на сообщение
    function replyToMsg(msg) {
      replyToMessage = { id: msg.id, text: msg.text || (msg.fileInfo ? msg.fileInfo.originalname : (msg.imageUrl ? 'Изображение' : '')), fromName: msg.fromName };
      replyTextSpan.textContent = `Ответ ${msg.isOwn ? 'себе' : replyToMessage.fromName}: ${replyToMessage.text.substring(0, 30)}${replyToMessage.text.length > 30 ? '…' : ''}`;
      replyPreview.style.display = 'flex';
    }

    cancelReplyBtn.addEventListener('click', cancelReply);
    function cancelReply() {
      replyToMessage = null;
      replyPreview.style.display = 'none';
    }

    // Предпросмотр файла
    fileUpload.addEventListener('change', () => {
      if (fileUpload.files.length) {
        selectedFile = fileUpload.files[0];
        fileNameSpan.textContent = selectedFile.name;
        filePreview.style.display = 'flex';
      } else {
        cancelFile();
      }
    });

    cancelFileBtn.addEventListener('click', cancelFile);
    function cancelFile() {
      selectedFile = null;
      fileUpload.value = '';
      filePreview.style.display = 'none';
    }

    // Получение сообщения
    socket.on('private message', (msg) => {
      const isOwn = msg.from === currentUser.id;
      const peerId = isOwn ? msg.to : msg.from;
      const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      if (!chatHistory[peerId]) chatHistory[peerId] = { messages: [], peerName: null, isTyping: false };
      const message = {
        id: msg.id,
        fromName: msg.fromName,
        text: msg.text,
        imageUrl: msg.imageUrl,
        fileInfo: msg.fileInfo,
        replyTo: msg.replyTo,
        isOwn,
        read: isOwn,
        time,
        timestamp: msg.timestamp,
        edited: msg.edited || false
      };
      chatHistory[peerId].messages.push(message);
      if (!isOwn) chatHistory[peerId].peerName = msg.fromName;
      saveToStorage();

      const isActiveChat = selectedUser && selectedUser.id === peerId;
      if (!isOwn) {
        if (isActiveChat) playActiveChatSound(); else playNotificationSound();
      }
      if (isActiveChat) {
        loadChatHistory(peerId); // перезагрузим с группировкой
        if (!isOwn) message.read = true;
      }
      buildChatList();
    });

    // Редактирование сообщения
    socket.on('message edited', ({ messageId, newText, from }) => {
      // Обновляем сообщение в истории
      for (let peerId in chatHistory) {
        const msgs = chatHistory[peerId].messages;
        const idx = msgs.findIndex(m => m.id === messageId);
        if (idx !== -1) {
          msgs[idx].text = newText;
          msgs[idx].edited = true;
          break;
        }
      }
      saveToStorage();
      if (selectedUser && (selectedUser.id === from || from === currentUser.id)) {
        loadChatHistory(selectedUser.id);
      }
    });

    // Удаление сообщения
    socket.on('message deleted', ({ messageId, from }) => {
      for (let peerId in chatHistory) {
        const msgs = chatHistory[peerId].messages;
        const idx = msgs.findIndex(m => m.id === messageId);
        if (idx !== -1) {
          msgs.splice(idx, 1);
          break;
        }
      }
      saveToStorage();
      if (selectedUser && (selectedUser.id === from || from === currentUser.id)) {
        loadChatHistory(selectedUser.id);
      }
      buildChatList();
    });

    // Очистка чата
    socket.on('chat cleared', ({ peerId }) => {
      if (chatHistory[peerId]) {
        chatHistory[peerId].messages = [];
        saveToStorage();
        if (selectedUser && selectedUser.id === peerId) messagesDiv.innerHTML = '';
        buildChatList();
      }
    });

    socket.on('typing', ({ from, fromName }) => {
      if (chatHistory[from]) { chatHistory[from].isTyping = true; buildChatList(); }
      if (selectedUser && selectedUser.id === from) typingIndicatorHeader.textContent = `${fromName} печатает...`;
    });

    socket.on('stop typing', ({ from }) => {
      if (chatHistory[from]) { chatHistory[from].isTyping = false; buildChatList(); }
      if (selectedUser && selectedUser.id === from) typingIndicatorHeader.textContent = '';
    });

    // Функция отображения одного сообщения
    function displayMessage(msg) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${msg.isOwn ? 'own' : 'other'}`;
      messageDiv.dataset.messageId = msg.id;

      // Если есть ответ (replyTo), показываем контекст
      if (msg.replyTo) {
        const replyDiv = document.createElement('div');
        replyDiv.className = 'reply-context';
        // Ищем оригинальное сообщение в истории (может быть не в памяти, но попробуем)
        let replyText = '...';
        const peerHistory = chatHistory[selectedUser.id]?.messages || [];
        const original = peerHistory.find(m => m.id === msg.replyTo);
        if (original) {
          replyText = original.text || (original.fileInfo ? original.fileInfo.originalname : (original.imageUrl ? 'Медиа' : ''));
        }
        replyDiv.textContent = `↩️ ${replyText.substring(0, 30)}${replyText.length > 30 ? '…' : ''}`;
        messageDiv.appendChild(replyDiv);
      }

      if (!msg.isOwn) {
        const nameSpan = document.createElement('div');
        nameSpan.className = 'sender';
        nameSpan.textContent = msg.fromName;
        messageDiv.appendChild(nameSpan);
      }
      if (msg.text) {
        const textSpan = document.createElement('div');
        textSpan.textContent = msg.text;
        messageDiv.appendChild(textSpan);
      }
      if (msg.imageUrl) {
        if (isVideoUrl(msg.imageUrl)) {
          const video = document.createElement('video');
          video.src = msg.imageUrl;
          video.controls = true;
          video.style.maxWidth = '100%';
          video.style.maxHeight = '200px';
          video.addEventListener('click', (e) => {
            e.stopPropagation();
            window.open(msg.imageUrl);
          });
          messageDiv.appendChild(video);
        } else {
          const img = document.createElement('img');
          img.src = msg.imageUrl;
          img.addEventListener('click', () => window.open(msg.imageUrl));
          messageDiv.appendChild(img);
        }
      }
      if (msg.fileInfo) {
        const a = document.createElement('a');
        a.href = msg.fileInfo.url;
        a.download = msg.fileInfo.originalname;
        a.className = 'file-attachment';
        a.innerHTML = `📎 <span>${msg.fileInfo.originalname}</span>`;
        messageDiv.appendChild(a);
      }

      const timeSpan = document.createElement('div');
      timeSpan.className = 'time';
      timeSpan.textContent = msg.time + (msg.edited ? ' (ред.)' : '');
      messageDiv.appendChild(timeSpan);

      // Кнопки действий (Reply, Edit, Delete)
      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'message-actions';

      const replyBtn = document.createElement('button');
      replyBtn.textContent = '↩️';
      replyBtn.title = 'Ответить';
      replyBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        replyToMsg(msg);
      });
      actionsDiv.appendChild(replyBtn);

      if (msg.isOwn) {
        const editBtn = document.createElement('button');
        editBtn.textContent = '✏️';
        editBtn.title = 'Редактировать';
        editBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          startEdit(msg.id, msg.text || '');
        });
        actionsDiv.appendChild(editBtn);

        const delBtn = document.createElement('button');
        delBtn.textContent = '🗑️';
        delBtn.title = 'Удалить';
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteMessage(msg.id);
        });
        actionsDiv.appendChild(delBtn);
      }

      messageDiv.appendChild(actionsDiv);
      messagesDiv.appendChild(messageDiv);
    }

    function isVideoUrl(url) {
      return /\.(mp4|webm|ogg|mov|avi)$/i.test(url);
    }

    // Прокрутка вниз и кнопка
    messagesDiv.addEventListener('scroll', checkScroll);
    scrollDownBtn.addEventListener('click', () => {
      messagesDiv.scrollTo({ top: messagesDiv.scrollHeight, behavior: 'smooth' });
    });

    function checkScroll() {
      const threshold = 100;
      const atBottom = messagesDiv.scrollHeight - messagesDiv.scrollTop - messagesDiv.clientHeight < threshold;
      scrollDownBtn.style.display = atBottom ? 'none' : 'flex';
    }

    // Звуки (без изменений)
    function playNotificationSound() { playBeep(800, 0.2, 0.1); }
    function playActiveChatSound() { playBeep(600, 0.1, 0.05); }
    function playSelfSendSound() { playBeep(600, 0.1, 0.05); }

    function playBeep(freq, gainValue, duration) {
      // ... (как в оригинале)
    }

    window.addEventListener('load', loadFromStorage);
    window.addEventListener('resize', () => {
      if (window.innerWidth > 768) chatMain.classList.remove('active');
      else if (selectedUser) chatMain.classList.add('active'); else chatMain.classList.remove('active');
    });
  </script>
</body>
</html>
